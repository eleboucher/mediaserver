---
- name: Bootstrap doco-cd on VPS
  hosts: all
  become: true
  gather_facts: false
  vars:
    ansible_user: root
    # Pass via: just vps install <ip>
    # Reads git_token and op_sa_token from 1Password on the local machine
    doco_cd_repo: "https://github.com/eleboucher/mediaserver.git"

  tasks:
    - name: Ping
      ansible.builtin.ping:

    - name: Install Docker
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash
        creates: /usr/bin/docker

    - name: Read GitHub deploy token from 1Password
      ansible.builtin.shell: "op read 'op://kubernetes/doco-cd/github-token' < /dev/null"
      delegate_to: localhost
      become: false
      register: github_token

    - name: Read 1Password service account token from 1Password
      ansible.builtin.shell: "op read 'op://kubernetes/doco-cd/credential' < /dev/null"
      delegate_to: localhost
      become: false
      register: op_sa_token

    - name: Create doco-cd directory
      ansible.builtin.file:
        path: /opt/doco-cd
        state: directory
        mode: "0700"

    - name: Stop existing Pangolin stack if present
      ansible.builtin.command: docker compose -f /opt/pangolin/docker-compose.yml down
      ignore_errors: true

    - name: Deploy doco-cd compose file
      ansible.builtin.copy:
        dest: /opt/doco-cd/docker-compose.yml
        mode: "0600"
        content: |
          services:
            doco-cd:
              image: ghcr.io/kimdre/doco-cd:latest
              container_name: doco-cd
              restart: unless-stopped
              environment:
                TZ: Europe/Paris
                GIT_ACCESS_TOKEN: "{{ github_token.stdout }}"
                SECRET_PROVIDER: 1password
                SECRET_PROVIDER_ACCESS_TOKEN: "{{ op_sa_token.stdout }}"
                POLL_CONFIG: |
                  - url: {{ doco_cd_repo }}
                    reference: refs/heads/main
                    interval: 60
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - /opt/pangolin:/data
              healthcheck:
                test: ["CMD", "/doco-cd", "healthcheck"]
                start_period: 15s
                interval: 30s
                timeout: 5s
                retries: 3

    - name: Start doco-cd
      ansible.builtin.command: docker compose -f /opt/doco-cd/docker-compose.yml up -d

    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "=== doco-cd is running ==="
          - "It will deploy Pangolin from {{ doco_cd_repo }} within ~60s."
          - ""
          - "Once Pangolin is up:"
          - "  1. Open https://pangolin.erwanleboucher.dev/auth/initial-setup"
          - "  2. Create an organisation + site"
          - "  3. Create an External Gateway resource pointing to kgateway-external"
          - "  4. Run: just vps save-newt {{ inventory_hostname }} <newt_id> <newt_secret> https://pangolin.erwanleboucher.dev"
