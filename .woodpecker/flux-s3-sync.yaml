---
clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      skip-verify: true

when:
  - branch: main
    event: push
    path: kubernetes/**

steps:
  - name: Sync kubernetes manifests to OVH S3
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID:
        from_secret: OVH_FLUX_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        from_secret: OVH_FLUX_SECRET_ACCESS_KEY
      AWS_DEFAULT_REGION: rbx
    commands:
      - aws s3 sync ./kubernetes/ s3://homelab-flux/kubernetes/ --delete --endpoint-url https://s3.rbx.io.cloud.ovh.net

  - name: Trigger Flux reconciliation
    image: alpine/curl:latest
    environment:
      WEBHOOK_TOKEN:
        from_secret: FLUX_WEBHOOK_TOKEN
      WEBHOOK_URL:
        from_secret: FLUX_WEBHOOK_URL
    commands:
      - apk add --no-cache openssl
      - SIGNATURE=$(printf '{}' | openssl dgst -sha256 -r -hmac "$${WEBHOOK_TOKEN}" | awk '{print $1}')
      - "HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \"$${WEBHOOK_URL}\" -H 'Content-Type: application/json' -H \"X-Signature: sha256=$${SIGNATURE}\" -d '{}')"
      - "echo \"Flux webhook response: HTTP $${HTTP_STATUS}\""
      - "test \"$${HTTP_STATUS}\" = \"200\""
