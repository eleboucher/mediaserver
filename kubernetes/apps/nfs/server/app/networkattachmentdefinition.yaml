    {
      "cniVersion": "0.3.1",
      "name": "nfs-lan",
      "type": "bridge",
      "bridge": "bond0",
      "ipam": {
        "type": "static",
        "addresses": [{"address": "192.168.1.40/24", "gateway": "192.168.1.2"}]
      }
    }
