---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 1h
  values:
    auth:
      oidc:
        enabled: true
        issuerUrl: https://idm.erwanleboucher.dev/oauth2/openid/renovate-operator
        clientId: renovate-operator
        existingSecret: kanidm-renovate-operator-oidc
        secretKey: client-secret
        redirectUrl: https://renovate.erwanleboucher.dev/auth/callback
        additionalScopes:
          - groups
    fullnameOverride: renovate-operator
    route:
      enabled: true
      hostnames:
        - renovate.erwanleboucher.dev
      parentRefs:
        - name: envoy-internal
          namespace: network
    webhook:
      enabled: true
      route:
        enabled: true
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 401"]
        hostnames:
          - renovate-webhook.erwanleboucher.dev
        parentRefs:
          - name: envoy-external
            namespace: network
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        grafanaDashboard:
          allowCrossNamespaceImport: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: GrafanaDashboard
              name: renovate-operator-dashboard
            patch: |-
              - op: replace
                path: /spec/instanceSelector/matchLabels
                value:
                  dashboards: grafana
