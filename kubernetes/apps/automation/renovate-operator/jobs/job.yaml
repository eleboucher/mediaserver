---

# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: homelab
spec:
  provider:
    name: forgejo
    endpoint: https://git.erwanleboucher.dev/api/v1
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_ALLOWED_COMMANDS
      value: '["pnpm run bundle"]'
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.database.svc:6379/2"
  image: ghcr.io/renovatebot/renovate:43.86.0
  parallelism: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * *
  secretRef: renovate-secret
  webhook:
    enabled: true
    authentication:
      enabled: true
      secretRef:
        name: renovate-secret
        key: RENOVATE_WEBHOOK_TOKEN
    forgejo:
      sync:
        enabled: true
        webhookURL: https://renovate-webhook.erwanleboucher.dev/webhook/v1/forgejo
        tokenSecretRef:
          name: renovate-secret
          key: RENOVATE_TOKEN
        authTokenSecretRef:
          name: renovate-secret
          key: RENOVATE_WEBHOOK_TOKEN
