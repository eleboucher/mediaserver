# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate-operator
  namespace: flux-system
spec:
  components:
    - ../../../../components/oidc
  interval: 1h
  path: ./kubernetes/apps/automation/renovate-operator/app
  postBuild:
    substitute:
      APP: renovate-operator
      APP_NAMESPACE: automation
      SUBDOMAIN: renovate
      OIDC_DISPLAY_NAME: Renovate
      OIDC_CALLBACK: /auth/callback
      OIDC_DISABLE_PKCE: "true"
      OIDC_GROUP: admins
  prune: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: renovate-operator
      namespace: automation
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: automation
  timeout: 5m
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: renovate-operator-jobs
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/automation/renovate-operator/jobs
  dependsOn:
    - name: renovate-operator
    - name: external-secrets
      namespace: security
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: automation
  timeout: 5m
  wait: false
