---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qbittorrent
  namespace: flux-system
spec:
  components:
    - ../../../../components/oidc/envoy
    - ../../../../components/volsync
    - ../../../../components/nfs-scaler
  interval: 1h
  path: ./kubernetes/apps/downloads/qbittorrent/app
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  postBuild:
    substitute:
      APP: qbittorrent
      APP_NAMESPACE: downloads
      OIDC_DISPLAY_NAME: qBittorrent
      OIDC_GROUP: admins
      OIDC_SCOPES: '["openid", "profile"]'
      SUBDOMAIN: qbit
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_SCHEDULE: "30 1-23/2 * * *"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  timeout: 5m
  wait: false
