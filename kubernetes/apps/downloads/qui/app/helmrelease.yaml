---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qui
  namespace: downloads
spec:
  chartRef:
    kind: OCIRepository
    name: qui
  interval: 1h
  values:
    controllers:
      qui:
        pod:
          nodeSelector:
            kubernetes.io/hostname: kharkiv
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        type: deployment
        containers:
          app:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.17.0
            env:
              - name: TZ
                value: "Europe/Paris"
              - name: QUI__HOST
                value: "0.0.0.0"
              - name: QUI__BASE_URL
                value: "/"
              - name: QUI__PORT
                value: "8080"
              - name: QUI__OIDC_CLIENT_ID
                value: "qui"
              - name: QUI__OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: kanidm-qui-oidc
                    key: client-secret
              - name: QUI__OIDC_DISABLE_BUILT_IN_LOGIN
                value: "true"
              - name: QUI__OIDC_ENABLED
                value: "true"
              - name: QUI__OIDC_ISSUER
                value: "https://idm.erwanleboucher.dev/oauth2/openid/qui"
              - name: QUI__OIDC_REDIRECT_URL
                value: "https://qui.erwanleboucher.dev/api/auth/oidc/callback"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: qui
        ports:
          http:
            port: 8080
            protocol: TCP
    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - qui.erwanleboucher.dev
    persistence:
      data:
        type: nfs
        server: normandie.internal
        path: /
        globalMounts:
          - path: /data
      config:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
