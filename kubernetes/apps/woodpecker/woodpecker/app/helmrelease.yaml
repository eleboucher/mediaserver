---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app woodpecker
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: woodpecker
  values:
    server:
      env:
        # Forgejo forge configuration
        WOODPECKER_FORGEJO: "true"
        WOODPECKER_FORGEJO_URL: https://git.erwanleboucher.dev
        # Server configuration
        WOODPECKER_HOST: https://ci.erwanleboucher.dev
        WOODPECKER_ADMIN: eleboucher
        WOODPECKER_OPEN: "true"
        WOODPECKER_DATABASE_DRIVER: postgres
        WOODPECKER_DATABASE_DATASOURCE:
          valueFrom:
            secretKeyRef:
              name: woodpecker-postgres
              key: url
        # Disable user agent registration (only admin can register agents)
        WOODPECKER_DISABLE_USER_AGENT_REGISTRATION: "true"
        # Use authentication even for public repos (required since Forgejo requires signin)
        WOODPECKER_AUTHENTICATE_PUBLIC_REPOS: "true"
        WOODPECKER_EXTENSIONS_ALLOWED_HOSTS: "private"
      extraSecretNamesForEnvFrom:
        - woodpecker-secret
      extraVolumes:
        - name: postgres-woodpecker
          secret:
            defaultMode: 0600
            secretName: postgres-woodpecker-cert
        - name: root-ca
          secret:
            defaultMode: 0600
            secretName: root-ca

      extraVolumeMounts:
        - name: postgres-woodpecker
          mountPath: "/var/run/secrets/postgresql"
        - name: root-ca
          mountPath: "/var/run/secrets/root-ca"
      persistentVolume:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 512Mi

    agent:
      env:
        WOODPECKER_SERVER: "woodpecker-server:9000"
        WOODPECKER_BACKEND: kubernetes
        WOODPECKER_MAX_WORKFLOWS: "2"
        WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
        WOODPECKER_BACKEND_K8S_STORAGE_CLASS: openebs-hostpath
        WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 10Gi
        WOODPECKER_BACKEND_K8S_STORAGE_RWX: "true"
        WOODPECKER_CONNECT_RETRY_COUNT: "1"
        # No gvisor on core-k3s (Asahi Linux uses 16K pages, incompatible with gvisor)
        # Schedule workflow pods on nodes labeled for CI workloads
        WOODPECKER_BACKEND_K8S_POD_NODE_SELECTOR: '{"workload/ci":"true"}'
        # Note: Workflow pod resources must be set per-step in pipeline YAML via
        # backend_options.kubernetes.resources (no agent-level env var exists)
      extraSecretNamesForEnvFrom:
        - woodpecker-secret
      persistence:
        enabled: true
        size: 128Mi
        storageClass: longhorn
        accessMode: ReadWriteOnce
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 256Mi
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: woodpecker-agent
            patch: |-
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: woodpecker-agent
                annotations:
                  reloader.stakater.com/auto: "true"
