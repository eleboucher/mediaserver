---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: woodpecker
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: woodpecker-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Forgejo OAuth credentials
        WOODPECKER_FORGEJO_CLIENT: "{{ .oauth_client_id }}"
        WOODPECKER_FORGEJO_SECRET: "{{ .oauth_client_secret }}"
        # Agent-to-server shared secret
        WOODPECKER_AGENT_SECRET: "{{ .agent_secret }}"
  dataFrom:
    - extract:
        key: woodpecker
