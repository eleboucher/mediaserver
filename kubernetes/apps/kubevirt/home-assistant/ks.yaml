---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-home-assistant
spec:
  dependsOn:
    - name: kubevirt-operator
    - name: kubevirt-cdi
  components:
    - ../../../../components/oidc
  interval: 1h
  path: ./kubernetes/apps/kubevirt/home-assistant/app
  prune: true
  postBuild:
    substitute:
      APP: home-assistant
      APP_NAMESPACE: home-assistant
      SUBDOMAIN: home
      OIDC_DISPLAY_NAME: "Home Assistant"
      OIDC_CALLBACK: /auth/openid/callback
      OIDC_DISABLE_PKCE: "true"
      OIDC_ORIGIN: /auth/openid/welcome
      OIDC_SHORT_USERNAME: "true"
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: home-assistant
  timeout: 15m
  wait: true
