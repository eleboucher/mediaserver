---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: intel-xpumd
spec:
  dependsOn:
    - name: intel-gpu-resource-driver
    - name: kube-prometheus-stack
      namespace: observability
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: intel-xpumd
      namespace: intel-xpumd
  interval: 1h
  path: ./kubernetes/apps/kube-system/intel-xpumd/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: intel-xpumd
