---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: llama-cpp
  interval: 1h
  values:
    controllers:
      llama-cpp:
        pod:
          nodeSelector:
            kubernetes.io/hostname: paris
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: llama-cpp-gpu
          securityContext:
            supplementalGroups:
              - 44 # video
              - 992 # render
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        initContainers:
          download-models:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                uv pip install --system --no-cache huggingface_hub
                for ref in \
                  unsloth/gemma-4-E4B-it-GGUF:UD-Q8_K_XL \
                  unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL
                do
                  download-model "$ref"
                done
            env:
              HUGGINGFACE_HUB_CACHE: /models
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: HF_TOKEN
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-intel-b9049@sha256:c41427b2188ba0d95b96588d4f728ce1b7007489d79e50831addb1bce5dc118e
            args:
              - --models-preset
              - /config/presets.ini
              - --n-gpu-layers
              - "35"
              - --flash-attn
              - on
            env:
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: "8080"
              LLAMA_OFFLINE: "1"
              ONEAPI_DEVICE_SELECTOR: level_zero:0
              SYCL_CACHE_PERSISTENT: "0"
              ZES_ENABLE_SYSMAN: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 3
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 3
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 40Gi
            securityContext:
              privileged: true
    service:
      app:
        controller: llama-cpp
        ports:
          http:
            port: 8080
            protocol: TCP
    route:
      app:
        hostnames:
          - "llama.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
    persistence:
      config:
        type: configMap
        name: llama-cpp-config
        globalMounts:
          - path: /config/presets.ini
            subPath: presets.ini
            readOnly: true
      download-script:
        type: configMap
        name: llama-cpp-download-script
        defaultMode: 0o755
        advancedMounts:
          llama-cpp:
            download-models:
              - path: /usr/bin/download-model
                subPath: download-model.sh
                readOnly: true
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          llama-cpp:
            app:
              - path: /models
                readOnly: true
            download-models:
              - path: /models
                readOnly: false
      render-device:
        type: hostPath
        hostPath: /dev/dri/renderD128
        globalMounts:
          - path: /dev/dri/renderD128
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
