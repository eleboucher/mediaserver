---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: memory-mcp
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: toolhive-config
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/ai/memory-mcp/app
  prune: true
  postBuild:
    substitute:
      APP: memory-mcp
      APP_UID: "65534"
      APP_GID: "65533"
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
