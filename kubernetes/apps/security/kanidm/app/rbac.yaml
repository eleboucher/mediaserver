---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kanidm-provision
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/rbac.authorization.k8s.io/clusterrole_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kanidm-provision-write-secrets
rules:
  - apiGroups:
      - ""
    resources:
      - "secrets"
    verbs:
      - "create"
      - "patch"
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/rbac.authorization.k8s.io/role_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kanidm-provision-read-configmaps
rules:
  - apiGroups:
      - ""
    resources:
      - "configmaps"
    verbs:
      - "get"
      - "list"
      - "watch"
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/rbac.authorization.k8s.io/clusterrolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kanidm-provision-write-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kanidm-provision-write-secrets
subjects:
  - kind: ServiceAccount
    name: kanidm-provision
    namespace: security
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/rbac.authorization.k8s.io/rolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kanidm-provision-read-configmaps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kanidm-provision-read-configmaps
subjects:
  - kind: ServiceAccount
    name: kanidm-provision
    namespace: security
