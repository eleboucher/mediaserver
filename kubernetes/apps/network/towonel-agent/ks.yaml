# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-agent
spec:
  interval: 1h
  path: ./kubernetes/apps/network/towonel-agent/app
  postBuild:
    substitute:
      APP: towonel-agent
      APP_NAMESPACE: network
    substituteFrom:
      - kind: Secret
        name: towonel-agent-secret
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
