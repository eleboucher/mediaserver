---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: towonel-agent
spec:
  endpoints:
    - dnsName: external.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_ADD_IP}
    - dnsName: erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: www.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: openpgpkey.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: doco-cd.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: registry.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: towonel.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: tunnel.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_ADD_IP}
