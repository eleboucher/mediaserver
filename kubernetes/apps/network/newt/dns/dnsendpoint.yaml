---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: pangolin
spec:
  endpoints:
    - dnsName: external.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: pangolin.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: www.erwanleboucher.dev
      recordType: A
      targets:
        - ${VPS_IP}
