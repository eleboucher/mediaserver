---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt-sidecar
spec:
  interval: 6h
  path: ./kubernetes/apps/network/newt/crds
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt
spec:
  interval: 6h
  path: ./kubernetes/apps/network/newt/app
  dependsOn:
    - name: external-secrets
      namespace: security
    - name: newt-sidecar
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt-dns
spec:
  interval: 6h
  path: ./kubernetes/apps/network/newt/dns
  dependsOn:
    - name: newt
  postBuild:
    substituteFrom:
      - kind: Secret
        name: newt-secret
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: false
