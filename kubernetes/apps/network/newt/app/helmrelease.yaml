---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  chartRef:
    kind: OCIRepository
    name: newt
  interval: 1h
  values:
    global:
      deploymentAnnotations:
        reloader.stakater.com/auto: "true"
      image:
        # renovate: datasource=github-releases depName=fosrl/newt
        tag: "1.10.3"
      nativeMode:
        enabled: false
      networkPolicy:
        enabled: false
      prometheusRule:
        enabled: true

    rbac:
      clusterRole: true

    serviceAccount:
      automountServiceAccountToken: true
      name: newt

    newtInstances:
      - name: main-tunnel
        enabled: true
        replicas: 1
        pingInterval: 60s
        auth:
          existingSecretName: newt-secret
        extraEnv:
          BLUEPRINT_FILE: /etc/newt/blueprint.yaml
          NEWT_ADMIN_ADDR: "0.0.0.0:2112"
          NEWT_METRICS_PROMETHEUS_ENABLED: "true"
        extraVolumeMounts:
          - name: blueprint
            mountPath: /etc/newt
        extraVolumes:
          - name: blueprint
            emptyDir: {}
        initContainers:
          - name: newt-sidecar
            image: ghcr.io/home-operations/newt-sidecar:0.2.0
            args:
              - --gateway-name=kgateway-external
              - --target-hostname=kgateway-external.network.svc.cluster.local
              - --deny-countries=RU,CN,KP,IR,BY,IL
            env:
              - name: NEWTSC_SITE_ID
                valueFrom:
                  secretKeyRef:
                    name: newt-secret
                    key: NEWTSC_SITE_ID
            restartPolicy: Always
            resources:
              limits:
                memory: 128Mi
            volumeMounts:
              - name: blueprint
                mountPath: /etc/newt
          - name: wait-blueprint
            image: ghcr.io/home-operations/busybox:1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
            command:
              - /bin/sh
              - -c
              - until test -f /etc/newt/blueprint.yaml; do sleep 1; done
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 16Mi
            volumeMounts:
              - name: blueprint
                mountPath: /etc/newt
        metrics:
          port: 2112
          service:
            enabled: true
            port: 2112
          serviceMonitor:
            enabled: true
        service:
          enabled: false
