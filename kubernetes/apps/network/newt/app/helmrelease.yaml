---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  chartRef:
    kind: OCIRepository
    name: newt
  interval: 30m
  values:
    global:

      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - "ALL"

    # Define your Newt instances here
    newtInstances:
      - name: "main-tunnel"
        enabled: true
        replicas: 1

        auth:
          existingSecretName: "newt-secret"
          keys:
            endpointKey: NEWT_SERVER_URL
            idKey: NEWT_ID
            secretKey: NEWT_SECRET
        blueprintFile: /etc/newt/blueprint.yaml
        blueprintData: |
          public-resources:
            kgateway-external:
              name: "External Gateway"
              protocol: http
              ssl: true
              full-domain: "external.erwanleboucher.dev"
              tls-server-name: external.erwanleboucher.dev
              rules:
                # State-sponsored threat actors / sanctioned nations
                - action: deny
                  match: country
                  value: RU
                - action: deny
                  match: country
                  value: CN
                - action: deny
                  match: country
                  value: KP
                - action: deny
                  match: country
                  value: IR
                - action: deny
                  match: country
                  value: BY
                - action: deny
                  match: country
                  value: IL
              targets:
                - site: glistening-desert-rosy-boa
                  hostname: kgateway-external.network.svc.cluster.local
                  method: https
                  port: 443

        resources:
          requests:
            cpu: "10m"
          limits:
            memory: "128Mi"
