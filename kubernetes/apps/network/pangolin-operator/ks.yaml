---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pangolin-operator
spec:
  interval: 6h
  path: ./kubernetes/apps/network/pangolin-operator/operator
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  timeout: 5m
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pangolin-operator-site
spec:
  interval: 6h
  path: ./kubernetes/apps/network/pangolin-operator/site
  dependsOn:
    - name: pangolin-operator
  prune: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: pangolin-operator-secret
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
