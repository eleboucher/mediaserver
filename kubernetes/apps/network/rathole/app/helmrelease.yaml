---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rathole
spec:
  chartRef:
    kind: OCIRepository
    name: rathole
  interval: 1h
  values:
    controllers:
      rathole:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=rapiz1/rathole
              repository: docker.io/rapiz1/rathole
              tag: v0.5.0
            args:
              - --client
              - /config/client.toml
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: secret
        name: rathole-secret
        globalMounts:
          - path: /config
            readOnly: true
