---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rathole-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: rathole-secret
    creationPolicy: Owner
    # Render the full client.toml with the real token at sync time.
    # Three services:
    #   - forgejo-ssh: cluster SSH :2222 surfaced on VPS :2222 (public)
    #   - prom-write:  cluster VictoriaMetrics vmsingle reachable from VPS
    #                  prometheus-agent as `rathole:8428`
    #   - vlogs-write: cluster VictoriaLogs reachable from VPS fluent-bit
    #                  as `rathole:9428`
    template:
      engineVersion: v2
      data:
        client.toml: |
          [client]
          remote_addr = "tunnel.erwanleboucher.dev:2333"
          heartbeat_timeout = 40

          [client.services.prom-write]
          token = "{{ .token }}"
          local_addr = "vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428"

          [client.services.vlogs-write]
          token = "{{ .token }}"
          local_addr = "victoria-logs-client.observability.svc.cluster.local:9428"
  data:
    - secretKey: token
      remoteRef:
        key: rathole
        property: forgejo_ssh_token
