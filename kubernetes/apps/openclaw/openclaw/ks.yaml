---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw
  namespace: flux-system
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: external-secrets
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/openclaw/openclaw/app
  postBuild:
    substitute:
      APP: openclaw
      APP_NAMESPACE: openclaw
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_PGID: "100"
      VOLSYNC_SCHEDULE: "0 3 * * *"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: openclaw
  timeout: 5m
  wait: false
