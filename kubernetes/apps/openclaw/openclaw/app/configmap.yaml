---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-configmap
data:
  openclaw.json: |-
    {
      "gateway": {
        "auth": {
          "mode": "token",
          "token": "{{ .GATEWAY_TOKEN }}"
        },
        "bind": "lan",
        "controlUi": {
          "allowInsecureAuth": true,
          "allowedOrigins": ["https://openclaw.erwanleboucher.dev"]
        },
        "mode": "local",
        "nodes": {
          "denyCommands": [
            "camera.snap",
            "camera.clip",
            "screen.record",
            "contacts.add",
            "calendar.add",
            "reminders.add",
            "sms.send",
            "sms.search"
          ]
        },
        "port": 18789,
        "tailscale": {
          "mode": "off",
          "resetOnExit": false
        },
        "trustedProxies": ["10.42.0.0/16"]
      },
      "agents": {
        "defaults": {
          "maxConcurrent": 4,
          "model": {
            "primary": "llama-cpp/qwen/qwen3.6-35B-A3B:general",
            "fallbacks": [
              "llama-cpp/google/gemma-4-E4B-it"
            ]
          },
          "subagents": {
            "maxConcurrent": 8
          },
          "workspace": "/home/node/.openclaw/workspace"
        }
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto"
      },
      "auth": {
        "profiles": {
          "llama-cpp:default": {
            "provider": "llama-cpp",
            "mode": "api_key"
          }
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "groupPolicy": "allowlist",
          "guilds": {
            "1441534507017703547": {
              "channels": {
                "1501981764430594189": {
                  "enabled": true
                }
              }
            }
          },
          "token": "{{ .DISCORD_TOKEN }}"
        }
      },
      "hooks": {
        "internal": {
          "enabled": true,
          "entries": {
            "compaction-notifier": {
              "enabled": true
            },
            "session-memory": {
              "enabled": true
            }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "llama-cpp": {
            "api": "openai-responses",
            "apiKey": "{{ .LLAMA_API_KEY }}",
            "baseUrl": "http://llama-cpp.ai:8080/v1",
            "models": [
              {
                "id": "google/gemma-4-E4B-it",
                "name": "Gemma 4 E4B",
                "reasoning": false,
                "input": ["text", "image"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 131072,
                "maxTokens": 8192,
                "compat": {
                  "supportsUsageInStreaming": true
                }
              },
              {
                "id": "qwen/qwen3.6-35B-A3B:general",
                "name": "Qwen3.6 35B A3B",
                "reasoning": false,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 32768,
                "maxTokens": 8192,
                "compat": {
                  "supportsUsageInStreaming": true
                }
              }
            ]
          }
        }
      },
      "plugins": {
        "entries": {
          "discord": {
            "enabled": true
          },
          "searxng": {
            "config": {
              "webSearch": {
                "baseUrl": "http://searxng.selfhosted.svc.cluster.local:8080"
              }
            },
            "enabled": true
          }
        }
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "tools": {
        "profile": "coding",
        "web": {
          "fetch": {
            "enabled": true
          },
          "search": {
            "enabled": true,
            "provider": "searxng"
          }
        }
      }
    }
