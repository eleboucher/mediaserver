---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: heisenbridge
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: heisenbridge
  dependsOn:
    - name: continuwuity
  interval: 1h
  path: "./kubernetes/apps/matrix/heisenbridge/app"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: matrix
  timeout: 5m
  wait: false
