---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    profile: shortlived
    privateKeySecretRef:
      name: letsencrypt-production
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          webhook:
            groupName: acme.erwanleboucher.dev
            solverName: ovh
            config:
              endpoint: ovh-eu
              authenticationMethod: application
              applicationKeyRef:
                key: applicationKey
                name: ovh-issuer-secret
              applicationSecretRef:
                key: applicationSecret
                name: ovh-issuer-secret
              applicationConsumerKeyRef:
                key: consumerKey
                name: ovh-issuer-secret
        selector:
          dnsZones:
            - erwanleboucher.dev
