---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  values:
    httpRoute:
      enabled: false
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: ssh
    image:
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.1-rootless
    gitea:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      admin:
        existingSecret: forgejo-secret
      oauth:
        - name: kanidm
          provider: openidConnect
          existingSecret: kanidm-forgejo-oidc
          autoDiscoverUrl: "https://idm.erwanleboucher.dev/oauth2/openid/forgejo/.well-known/openid-configuration"
      config:
        APP_NAME: "Erwan's Forge"
        APP_SLOGAN: "deep deep in the mine"
        ui:
          THEMES: forgejo-auto,forgejo-light,forgejo-dark,anthracite,anthracite-dark,anthracite-light
          DEFAULT_THEME: anthracite
        ui.meta:
          AUTHOR: Erwan Leboucher
          DESCRIPTION: "Erwan's Forge"
        database:
          DB_TYPE: postgres
          HOST: pooler-rw.database.svc:5432
          USER: forgejo
          NAME: forgejo
          SSL_MODE: verify-full
        lfs:
          PATH: /data/git/lfs
        security:
          REVERSE_PROXY_TRUSTED_PROXIES: 10.42.0.0/16
        server:
          APP_DATA_PATH: /data/gitea
          ROOT_URL: https://git.erwanleboucher.dev
          SSH_DOMAIN: git.erwanleboucher.dev
          SSH_PORT: 2222
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
          START_SSH_SERVER: true
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          ENABLE_INTERNAL_SIGNIN: false
          SHOW_REGISTRATION_BUTTON: false
          ENABLE_PASSWORD_SIGNIN_FORM: false
          ENABLE_NOTIFY_MAIL: true
        repository:
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          DISABLE_DOWNLOAD_SOURCE_ARCHIVES: true
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/signing/ed25519.pub
          SIGNING_NAME: git.erwanleboucher.dev Instance
          SIGNING_EMAIL: noreply@git.erwanleboucher.dev
          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey
        metrics:
          ENABLED: true
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.database.svc:6379?pool_size=100&idle_timeout=180s
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.database.svc:6379?pool_size=100&idle_timeout=180s
          SESSION_LIFE_TIME: "1209600"
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://dragonfly.database.svc:6379?pool_size=100&idle_timeout=180s
        actions:
          ENABLED: true
        mailer:
          ENABLED: true
          FROM: Forgejo <forgejo@erwanleboucher.dev>
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.selfhosted.svc.cluster.local
          SMTP_PORT: 25
        webhook:
          ALLOWED_HOST_LIST: "*"
    deployment:
      env:
        - name: PGSSLROOTCERT
          value: /var/run/secrets/root-ca/ca.crt
        - name: PGSSLCERT
          value: /var/run/secrets/postgresql/tls.crt
        - name: PGSSLKEY
          value: /var/run/secrets/postgresql/tls.key
    service:
      ssh:
        port: 2222

    valkey-cluster:
      enabled: false
    postgresql-ha:
      enabled: false

    persistence:
      create: false
      claimName: ${APP}

    extraVolumes:
      - name: postgres-forgejo
        secret:
          defaultMode: 0o600
          secretName: postgres-forgejo-cert
      - name: root-ca
        secret:
          defaultMode: 0o600
          secretName: root-ca

      - name: signing-key
        secret:
          secretName: forgejo-signing-key
          defaultMode: 0o400
      - name: forgejo-ssh
        secret:
          secretName: forgejo-secret
          defaultMode: 0o400
      - name: forgejo-themes
        configMap:
          name: forgejo-themes
      - name: forgejo-logo
        configMap:
          name: forgejo-logo
    extraInitVolumeMounts:
      - name: postgres-forgejo
        mountPath: "/var/run/secrets/postgresql"
      - name: root-ca
        mountPath: "/var/run/secrets/root-ca"
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraContainerVolumeMounts:
      - name: postgres-forgejo
        mountPath: "/var/run/secrets/postgresql"
      - name: root-ca
        mountPath: "/var/run/secrets/root-ca"
      - name: forgejo-ssh
        mountPath: "/data/gitea/ssh/ssh_host_ed25519_key"
        subPath: ssh_host_ed25519_key
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
      - name: forgejo-themes
        mountPath: /data/gitea/public/assets/css
        readOnly: true
      - name: forgejo-logo
        mountPath: /data/gitea/public/assets/img
        readOnly: true
