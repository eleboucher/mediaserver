---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo
  components:
    - ../../../../components/anubis
    - ../../../../components/postgres/cert
    - ../../../../components/volsync
    - ../../../../components/oidc
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: "./kubernetes/apps/forgejo/forgejo/app"
  postBuild:
    substitute:
      APP: forgejo
      ANUBIS_TARGET: "http://forgejo-http.forgejo.svc:3000"
      APP_NAMESPACE: forgejo
      VOLSYNC_CAPACITY: 20Gi
      OIDC_CALLBACK: /user/oauth2/kanidm/callback
      SUBDOMAIN: git
      OIDC_SCOPES: '["openid", "profile", "email", "groups", "ssh_publickeys"]'
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: forgejo
  timeout: 5m
  wait: false
