---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-github-app
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: flux-system
    template:
      type: Opaque
      data:
        githubAppID: "2594290"
        githubAppInstallationID: "102625202"
        githubAppPrivateKey: "{{ .github-app-private-key }}"
  dataFrom:
    - extract:
        key: vpn-config
