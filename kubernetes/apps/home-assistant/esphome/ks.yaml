---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: esphome
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: esphome
  interval: 1h
  components:
    - ../../../../components/volsync
  path: "./kubernetes/apps/home-assistant/esphome/app"
  postBuild:
    substitute:
      APP: esphome
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-assistant
  timeout: 5m
  wait: false
