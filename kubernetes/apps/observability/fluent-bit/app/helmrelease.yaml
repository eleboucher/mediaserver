---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  interval: 1h
  values:
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    env:
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
    config:
      service: |-
        [SERVICE]
          daemon off
          flush {{ .Values.flush }}
          log_level {{ .Values.logLevel }}
          parsers_file /fluent-bit/etc/parsers.conf
          parsers_file /fluent-bit/etc/conf/custom_parsers.conf
          http_server on
          http_listen 0.0.0.0
          http_port {{ .Values.metricsPort }}
          health_check on

      inputs: |-
        [INPUT]
          name tcp
          alias talos_kernel
          listen 127.0.0.1
          port 5170
          tag talos.kernel
          format json
          chunk_size 32
          buffer_size 64

      filters: |-
        [FILTER]
          name modify
          match talos.*
          add node ${NODE_NAME}
          rename talos-level level
          rename talos-time talos_time

      outputs: |-
        [OUTPUT]
          name http
          match talos.*
          host victoria-logs-server.observability.svc.cluster.local
          port 9428
          uri /insert/jsonline?_stream_fields=node,facility,priority,level&_msg_field=msg&_time_field=date
          format json_lines
          json_date_format iso8601
          compress gzip
          log_response_payload false
    dashboards:
      enabled: true
    serviceMonitor:
      enabled: true
    logLevel: warn
