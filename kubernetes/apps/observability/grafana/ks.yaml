---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-instance
spec:
  dependsOn:
    - name: grafana
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: ./kubernetes/apps/observability/grafana/instance
  prune: true
  components:
    - ../../../../components/oidc
  postBuild:
    substitute:
      APP: grafana
      APP_NAMESPACE: &namespace observability
      OIDC_DISPLAY_NAME: Grafana
      OIDC_CALLBACK: /login/generic_oauth
      OIDC_GROUP: admins
      OIDC_CLAIM_MAPS: |
        {
          "grafana_role": {
            "joinType": "array",
            "valuesByGroup": {
              "admins@idm.erwanleboucher.dev": ["GrafanaAdmin"]
            }
          }
        }
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
