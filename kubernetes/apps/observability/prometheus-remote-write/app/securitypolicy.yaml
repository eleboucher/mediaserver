---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/gateway.kgateway.dev/trafficpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: prometheus-remote-write-ip-allowlist
spec:
  rbac:
    action: Allow
    policy:
      matchExpressions:
        - "source.address.startsWith('100.89.128.1')"
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: prometheus-remote-write
