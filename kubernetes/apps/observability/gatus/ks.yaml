---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gatus
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/gatus/app
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: atuin
      APP_NAMESPACE: selfhosted
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  timeout: 5m
  wait: false
