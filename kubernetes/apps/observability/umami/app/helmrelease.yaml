---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name umami
spec:
  chartRef:
    kind: OCIRepository
    name: umami
  interval: 30m
  values:
    controllers:
      umami:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
        replicas: 1

        containers:
          app:
            image:
              repository: ghcr.io/umami-software/umami
              tag: 3.1.0
            env:
              TZ: "Europe/Paris"
              DISABLE_TELEMETRY: "true"
              APP_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: umami-secrets
                    key: APP_SECRET
              DATABASE_TYPE: "postgresql"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: umami-postgres
                    key: url

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

            resources:
              requests:
                cpu: 100m
                memory: 150Mi
              limits:
                memory: 512Mi

    global:
      fullnameOverride: *name

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      app:
        hostnames:
          - stats.erwanleboucher.dev
        parentRefs:
          - name: envoy-external
            namespace: network

    service:
      app:
        controller: umami
        ports:
          http:
            port: &port 3000
        primary: true
