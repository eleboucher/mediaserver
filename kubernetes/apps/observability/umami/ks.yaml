---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app umami
spec:
  components:
    - ../../../../components/postgres/pass
  interval: 1h
  path: ./kubernetes/apps/observability/umami/app
  prune: true
  postBuild:
    substitute:
      APP: *app
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
