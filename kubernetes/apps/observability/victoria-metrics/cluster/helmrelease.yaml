---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics
  interval: 1h
  valuesFrom:
    - kind: ConfigMap
      name: flux-metrics-configmap
      valuesKey: flux-metrics.yaml
  values:
    fullnameOverride: victoria-metrics-cluster

    prometheus-node-exporter:
      enabled: true
      fullnameOverride: node-exporter
      hostNetwork: false
      prometheus:
        monitor:
          enabled: true
          jobLabel: app.kubernetes.io/instance
          relabelings:
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: kubernetes_node
            - action: replace
              regex: (.*)
              replacement: $1
              sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: nodename
            - action: replace
              regex: (.*)
              replacement: $1.internal:9100
              sourceLabels:
                - kubernetes_node
              targetLabel: instance
      resources:
        requests:
          cpu: 23m
          memory: 64M
        limits:
          memory: 64M

    kube-state-metrics:
      enabled: true
      fullnameOverride: kube-state-metrics
      prometheus:
        monitor:
          enabled: true
          honorLabels: true

    vmcluster:
      enabled: false

    vmagent:
      spec:
        scrapeInterval: 30s
        externalLabels:
          cluster: home
        remoteWrite:
          - url: http://vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428/api/v1/write
        extraArgs:
          promscrape.streamParse: "true"
          promscrape.maxScrapeSize: "32MB"
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 1000m
            memory: 500Mi
        inlineRelabelConfig:
          - action: drop
            source_labels:
              - __name__
            regex: "cpu_feature_.+"
          - action: drop
            source_labels:
              - __name__
            regex: "kubernetes_feature_enabled"
          - action: labeldrop
            regex: ".+_node_kubevirt_io_.+"
          - action: labeldrop
            regex: "kubevirt_io_.+"
          - action: labeldrop
            regex: "feature_node_kubernetes_io_.+"

    vmalert:
      spec:
        evaluationInterval: 30s
        remoteWrite:
          url: http://vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428/api/v1/write
        remoteRead:
          url: http://vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428

    alertmanager:
      spec:
        externalURL: https://vmalertmanager.erwanleboucher.dev
        image:
          repository: prometheus/alertmanager
        replicaCount: 1
        securityContext:
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          fsGroup: 2000
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 5Gi
      useManagedConfig: true
      config:
        route:
          receiver: discord
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: blackhole
              matchers:
                - alertname = Watchdog
            - receiver: blackhole
              matchers:
                - severity = info
            - receiver: discord
              matchers:
                - severity = critical
          group_by:
            - alertname
            - cluster
            - job
          group_interval: 5m
          group_wait: 1m
        inhibit_rules:
          - equal:
              - alertname
              - namespace
            source_matchers:
              - severity = "critical"
            target_matchers:
              - severity = "warning"
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - send_resolved: true
                title: |-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ if eq .Status "firing" }}{{ if eq .CommonLabels.severity "critical" }}🔥{{ else if eq .CommonLabels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }}{{ else }}✅{{ end }} {{ if ne .CommonAnnotations.summary ""}}{{ .CommonAnnotations.summary }} {{ else if ne .CommonAnnotations.message ""}}{{ .CommonAnnotations.message }} {{ else if ne .CommonAnnotations.description ""}}{{ .CommonAnnotations.description }} {{ else }}{{ .CommonLabels.alertname }}{{ end }}
                message: |-
                  {{ range .Alerts -}}
                    **Alert:** {{ .Annotations.title }}{{ if .Labels.severity }} - `{{ .Labels.severity }}`{{ end }}

                  {{ if ne .Annotations.summary ""}}**Summary:** {{ .Annotations.summary }} {{ else if ne .Annotations.message ""}}**Message:** {{ .Annotations.message }} {{ else if ne .Annotations.description ""}}**Description:** {{ .Annotations.description }}{{ end }}

                  🏷 Labels:
                    {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                    {{ end }}
                  {{ end }}
                webhook_url_secret:
                  name: vmalertmanager-secret
                  key: DISCORD_WEBHOOK_URL
      route:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - vmalertmanager.erwanleboucher.dev

    vmsingle:
      enabled: true
      spec:
        retentionPeriod: 90d
        extraArgs:
          maxLabelsPerTimeseries: "40"
        storage:
          storageClassName: longhorn
          resources:
            requests:
              storage: 50Gi
      route:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - vmsingle.erwanleboucher.dev

    defaultDashboards:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true

    defaultDatasources:
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
    victoria-metrics-operator:
      enabled: false
    grafana:
      enabled: false
      forceDeployDatasource: true
    kubeApiServer:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - # Drop high cardinality labels
              action: drop
              sourceLabels:
                - __name__
              regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
            - # Drop high cardinality labels
              action: drop
              sourceLabels:
                - __name__
              regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
    vmauth:
      enabled: true
      spec:
        extraArgs:
          requestBufferSize: "65536"
        unauthorizedUserAccessSpec:
          url_map:
            - src_paths:
                - /api/v1/query.*
                - /api/v1/label/.*
              url_prefix: http://vmsingle-victoria-metrics-cluster-cluster.observability.svc.cluster.local:8428
            - src_paths:
                - /select/logsql/.*
              url_prefix: http://victoria-logs.observability.svc.cluster.local:9428
    kubelet:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - # Drop high-cardinality labels
              action: labeldrop
              regex: (uid|id|name)
            - # Drop high-cardinality labels
              action: drop
              sourceLabels:
                - __name__
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
            - # Drop cgroup metrics with no pod
              action: drop
              sourceLabels:
                - id
                - pod
              regex: .+;
            - # Drop less useful container blkio metrics
              action: drop
              sourceLabels:
                - __name__
              regex: container_blkio_device_usage_total
            - # Drop less useful container filesystem io metrics
              action: drop
              sourceLabels:
                - __name__
              regex: "container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)"
            - # Drop less useful container process metrics
              action: drop
              sourceLabels:
                - __name__
              regex: container_(tasks_state|threads_max)
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true
    additionalVictoriaMetricsMap:
      dockerhub-rules:
        create: true
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: There are {{ $value }} containers pulling from Dockerhub. This may lead to rate limiting.
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        create: true
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical
