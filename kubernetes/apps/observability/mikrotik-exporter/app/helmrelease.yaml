# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mikrotik-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: mktxp
  interval: 10m
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mktxp:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          mktxp:
            image:
              repository: ghcr.io/eleboucher/mktxp
              tag: 0.0.3
            command:
              - "/mktxp"
            args:
              - "--cfg-dir"
              - "/mktxp_config"
              - "export"

            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 512Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      mktxp:
        ports:
          http:
            port: 49090

    serviceMonitor:
      mktxp:
        serviceName: mikrotik-exporter
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    persistence:
      config:
        type: configMap
        name: mktxp-config
        globalMounts:
          - path: /mktxp_config/mktxp.yaml
            subPath: mktxp.yaml
          - path: /mktxp_config/_mktxp.yaml
            subPath: _mktxp.yaml
      credentials:
        type: secret
        name: mktxp-credentials
        globalMounts:
          - path: /mktxp_credentials
