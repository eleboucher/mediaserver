---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: mktxp-config
    files:
      - config/_mktxp.yaml
      - config/mktxp.yaml

resources:
  - helmrelease.yaml
  - ocirepository.yaml
  - externalsecret.yaml
  - grafanadashboard.yaml
