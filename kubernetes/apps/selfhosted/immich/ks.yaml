---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app immich
spec:
  components:
    - ../../../../components/postgres/cert
    - ../../../../components/nfs-scaler
    - ../../../../components/oidc
  interval: 1h
  path: ./kubernetes/apps/selfhosted/immich/app
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: selfhosted
      SUBDOMAIN: photos
      DATABASE_EXTENSIONS: |
        [
          { name: vector },
          { name: vchord },
          { name: cube },
          { name: earthdistance }
        ]
      OIDC_DISPLAY_NAME: "Immich"
      OIDC_CALLBACK: /auth/login
      OIDC_EXTRA_CALLBACKS: '["app.immich:///oauth-callback", "https://photos.erwanleboucher.dev/user-settings"]'
      OIDC_LEGACY_CRYPTO: "true"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
