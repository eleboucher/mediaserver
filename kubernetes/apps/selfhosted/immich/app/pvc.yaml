---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-library
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 10Ti
  mountOptions:
    - nfsvers=4.1
  nfs:
    path: /immich
    server: normandie.internal
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: selfhosted
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Ti
  storageClassName: ""
  volumeName: immich-library
