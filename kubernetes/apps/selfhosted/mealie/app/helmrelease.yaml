---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: mealie
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.17.0
            env:
              TZ: "Europe/Paris"
              BASE_URL: https://mealie.erwanleboucher.dev
              DB_ENGINE: postgres
              POSTGRES_URL_OVERRIDE:
                valueFrom:
                  secretKeyRef:
                    name: mealie-postgres
                    key: url
              SMTP_HOST: smtp-relay.selfhosted.svc.cluster.local
              SMTP_PORT: 25
              SMTP_FROM_NAME: Mealie
              SMTP_FROM_EMAIL: noreply@erwanleboucher.dev
              SMTP_AUTH_STRATEGY: NONE
              SMTP_USER: mealie@erwanleboucher.dev
              OPENAI_BASE_URL: http://ollama.ai:11434/v1
              OPENAI_API_KEY: mealie
              OIDC_AUTH_ENABLED: "true"
              OIDC_AUTO_REDIRECT: "true"
              OIDC_ADMIN_GROUP: admins@idm.erwanleboucher.dev
              OIDC_USER_GROUP: users@idm.erwanleboucher.dev
              OIDC_CLIENT_ID: mealie
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-mealie-oidc
                    key: client-secret
              OIDC_CONFIGURATION_URL: https://idm.erwanleboucher.dev/oauth2/openid/mealie/.well-known/openid-configuration
              OIDC_PROVIDER_NAME: Kanidm
              OIDC_REMEMBER_ME: "true"
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 500Mi

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data

    route:
      app:
        hostnames:
          - mealie.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network

    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000
            protocol: TCP
