---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: mealie
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.15.1
            env:
              TZ: "Europe/Paris"
              BASE_URL: https://mealie.erwanleboucher.dev
              DB_ENGINE: postgres
              POSTGRES_URL_OVERRIDE:
                valueFrom:
                  secretKeyRef:
                    name: mealie-postgres
                    key: url
              SMTP_HOST: smtp-relay.selfhosted.svc.cluster.local
              SMTP_PORT: 25
              SMTP_FROM_NAME: Mealie
              SMTP_FROM_EMAIL: noreply@erwanleboucher.dev
              SMTP_AUTH_STRATEGY: NONE
              SMTP_USER: mealie@erwanleboucher.dev
              OPENAI_BASE_URL: http://ollama.ai:11434/v1
              OPENAI_API_KEY: mealie
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 500Mi

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data

    route:
      app:
        hostnames:
          - mealie.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network

    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000
            protocol: TCP
