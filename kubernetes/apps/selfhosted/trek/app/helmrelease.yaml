---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
spec:
  chartRef:
    kind: OCIRepository
    name: trek
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      trek:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=mauriceboe/trek
              repository: mauriceboe/trek
              tag: 3.0.13
            env:
              ALLOWED_ORIGINS: https://travel.erwanleboucher.dev
              APP_URL: https://travel.erwanleboucher.dev
              FORCE_HTTPS: "true"
              NODE_ENV: production
              OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    key: client-id
                    name: kanidm-trek-oidc
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    key: client-secret
                    name: kanidm-trek-oidc
              OIDC_DISCOVERY_URL: https://idm.erwanleboucher.dev/oauth2/openid/trek/.well-known/openid-configuration
              OIDC_DISPLAY_NAME: Kanidm
              OIDC_ISSUER: https://idm.erwanleboucher.dev/oauth2/openid/trek
              OIDC_ONLY: "true"
              OIDC_SCOPE: openid email profile groups
              PORT: "3000"
              TRUST_PROXY: "1"
              TZ: Europe/Paris
            envFrom:
              - secretRef:
                  name: trek-secret
            probes:
              liveness:
                custom: true
                enabled: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /api/health
                    port: 3000
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                custom: true
                enabled: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /api/health
                    port: 3000
                  periodSeconds: 10
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    persistence:
      data:
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /app/data
      uploads:
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: longhorn
        globalMounts:
          - path: /app/uploads
    route:
      app:
        hostnames:
          - travel.erwanleboucher.dev
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - name: trek-anubis
                port: 8080
    service:
      app:
        controller: trek
        ports:
          http:
            port: 3000
