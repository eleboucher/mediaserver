---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webhook
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: webhook-secret
    creationPolicy: Owner
    template:
      data:
        WEBHOOK_SECRET: "{{ .webhook_token }}"
  dataFrom:
    - extract:
        key: renovate-forgejo
