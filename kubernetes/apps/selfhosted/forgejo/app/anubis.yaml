---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-anubis
  labels:
    app.kubernetes.io/name: forgejo-anubis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-anubis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-anubis
    spec:
      containers:
        - name: anubis
          image: ghcr.io/techarohq/anubis:v1.25.0
          env:
            - name: BIND
              value: ":8080"
            - name: TARGET
              value: "http://forgejo-http.selfhosted.svc:3000"
            - name: DIFFICULTY
              value: "4"
            - name: SERVE_ROBOTS_TXT
              value: "true"
            - name: METRICS_BIND
              value: ":9090"
            - name: OG_PASSTHROUGH
              value: "true"
            - name: OG_EXPIRY_TIME
              value: "24h"
            - name: ED25519_PRIVATE_KEY_HEX
              valueFrom:
                secretKeyRef:
                  name: forgejo-anubis-key
                  key: ED25519_PRIVATE_KEY_HEX
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          livenessProbe:
            exec:
              command: ["anubis", "--healthcheck"]
            initialDelaySeconds: 1
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["anubis", "--healthcheck"]
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-anubis
  labels:
    app.kubernetes.io/name: forgejo-anubis
spec:
  selector:
    app.kubernetes.io/name: forgejo-anubis
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
