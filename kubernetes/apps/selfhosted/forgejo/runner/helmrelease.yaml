---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  interval: 30m
  values:
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            host:
              workdir_parent: /persistent/cache/act
            kubernetes:
              namespace: selfhosted
              poll_timeout: 10m
            log:
              level: info
            pluginsv2:
              k8s:
                path: /plugins/forgejo-runner-k8s
                options:
                  namespace: selfhosted
                  poll_timeout: 10m
            runner:
              capacity: 10
              file: /persistent/.runner
              labels:
                - ubuntu-latest:k8s:/config/podspec-default.yaml
                - default:k8s:/config/podspec-default.yaml
                - docker:k8s:/config/podspec-dind.yaml
              timeout: 3h
          podspec-default.yaml: |-
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:36808ea38bd13448ee632ed3ecfc3eac7530fc0044d49b9988f8aff1e952480b
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    cpu: "1"
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
            restartPolicy: Never
          podspec-dind.yaml: |-
            initContainers:
              - name: dind
                image: docker:29-dind
                securityContext:
                  privileged: true
                restartPolicy: Always
                env:
                  - name: DOCKER_TLS_CERTDIR
                    value: /certs
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: "2"
                    memory: 4Gi
                volumeMounts:
                  - name: docker-storage
                    mountPath: /var/lib/docker
                  - name: docker-certs
                    mountPath: /certs
                readinessProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
                  initialDelaySeconds: 2
                  periodSeconds: 1
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: DOCKER_TLS_VERIFY
                    value: "1"
                  - name: DOCKER_CERT_PATH
                    value: /certs/client
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:36808ea38bd13448ee632ed3ecfc3eac7530fc0044d49b9988f8aff1e952480b
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    cpu: "1"
                    memory: 2Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                volumeMounts:
                  - name: docker-certs
                    mountPath: /certs
                    readOnly: true
            volumes:
              - name: docker-storage
                emptyDir: {}
              - name: docker-certs
                emptyDir: {}
            restartPolicy: Never
    controllers:
      forgejo-runner:
        type: statefulset
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        statefulset:
          volumeClaimTemplates:
            - name: persistent
              size: 1Gi
              accessMode: ReadWriteOnce
              globalMounts:
                - path: /persistent
        pod:
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        initContainers:
          copy-k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin-v2
              tag: sha-f7ab06b75887e5497c9f9f9bef641aafb2ae3e1c
            command:
              - sh
              - -c
              - cp /usr/local/bin/forgejo-runner-k8s /plugins/forgejo-runner-k8s
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          register-runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: sha-a954a95458892f9a9a03739d52610e26be4b25fd
            command:
              - sh
              - -c
              - |
                if [ -f /persistent/.runner ]; then
                  echo "Runner already registered, skipping"
                  exit 0
                fi
                echo "Registering runner..."
                cd /persistent && forgejo-runner register \
                  --instance http://forgejo-http:3000 \
                  --token "${RUNNER_TOKEN}" \
                  --name k8s-runner \
                  --labels "default:k8spod:/config/podspec-default.yaml" \
                  --no-interactive
            env:
              - name: RUNNER_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: forgejo-runner-secret
                    key: token
        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: sha-a954a95458892f9a9a03739d52610e26be4b25fd
            command:
              - /bin/forgejo-runner
              - daemon
              - --config
              - /config/runner.yaml
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    serviceAccount:
      forgejo-runner: {}
    rbac:
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - "pods"
              verbs:
                - "list"
                - "watch"
                - "create"
                - "get"
                - "delete"
            - apiGroups:
                - ""
              resources:
                - "pods/exec"
              verbs:
                - "create"
                - "get"
            - apiGroups:
                - ""
              resources:
                - "pods/log"
              verbs:
                - "list"
                - "watch"
                - "get"
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      plugins:
        type: emptyDir
        globalMounts:
          - path: /plugins
      tmpfs:
        type: emptyDir
        sizeLimit: 10Gi
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
