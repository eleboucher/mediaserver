---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/rbac.authorization.k8s.io/role_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgejo-runner
rules:
  - apiGroups:
      - ""
    resources:
      - "pods"
    verbs:
      - "list"
      - "watch"
      - "create"
      - "get"
      - "delete"
  - apiGroups:
      - ""
    resources:
      - "pods/exec"
    verbs:
      - "create"
      - "get"
  - apiGroups:
      - ""
    resources:
      - "pods/log"
    verbs:
      - "list"
      - "watch"
      - "get"
