---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/apps/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      name: forgejo-runner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        name: forgejo-runner
    spec:
      initContainers:
        - name: register-runner
          image: code.forgejo.org/johbo/k8s-runner:v9.1.1-21-gd2a8af7d
          command:
            - sh
            - -c
            - |
              if [ -f /persistent/.runner ]; then
                echo "Runner already registered, skipping"
                exit 0
              fi
              echo "Registering runner..."
              cd /persistent && forgejo-runner register \
                --instance https://git.erwanleboucher.dev \
                --token "${RUNNER_TOKEN}" \
                --name k8s-runner \
                --labels "default:k8spod:/config/podspec-default.yaml" \
                --no-interactive
          env:
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: token
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /persistent
              name: persistent
      containers:
        - name: forgejo-runner
          image: code.forgejo.org/johbo/k8s-runner:v9.1.1-21-gd2a8af7d
          command:
            - /bin/forgejo-runner
            - daemon
            - --config
            - /config/runner.yaml
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
            - mountPath: /persistent
              name: persistent
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      serviceAccountName: forgejo-runner
      volumes:
        - name: config
          configMap:
            defaultMode: 420
            name: forgejo-runner-config
        - name: data
          emptyDir:
            sizeLimit: 10Gi
        - name: persistent
          persistentVolumeClaim:
            claimName: forgejo-runner-data
