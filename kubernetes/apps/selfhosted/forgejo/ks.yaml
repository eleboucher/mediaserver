---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo
  components:
    - ../../../../components/postgres/cert
    - ../../../../components/volsync
    - ../../../../components/oidc
  dependsOn:
    - name: garage
      namespace: garage-system
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/forgejo/app"
  postBuild:
    substitute:
      APP: forgejo
      APP_NAMESPACE: selfhosted
      VOLSYNC_CAPACITY: 20Gi
      OIDC_CALLBACK: /user/oauth2/kanidm/callback
      SUBDOMAIN: git
      OIDC_DISABLE_PKCE: "true"
      OIDC_SCOPES: '["openid", "profile", "email", "groups", "ssh_publickeys"]'
      OIDC_CLIENT_ID_KEY: key
      OIDC_CLIENT_SECRET_KEY: secret
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo-runner
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: forgejo
  interval: 1h
  path: "./kubernetes/apps/selfhosted/forgejo/runner"
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
