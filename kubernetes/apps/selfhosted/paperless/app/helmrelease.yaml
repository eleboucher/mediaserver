---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless
spec:
  chartRef:
    kind: OCIRepository
    name: paperless
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      paperless:
        annotations:
          reloader.stakater.com/auto: "true"
        forceRename: paperless
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.13
            env:
              # Configure application
              PAPERLESS_URL: https://paperless.erwanleboucher.dev
              PAPERLESS_PORT: "8000"
              PAPERLESS_TIME_ZONE: "Europe/Paris"
              PAPERLESS_TASK_WORKERS: "2"
              PAPERLESS_OCR_LANGUAGES: fra eng
              PAPERLESS_OCR_LANGUAGE: fra
              # Configure folders
              PAPERLESS_CONSUMPTION_DIR: /data/nas/paperless/incoming
              PAPERLESS_DATA_DIR: /data/local/data
              PAPERLESS_EXPORT_DIR: /data/nas/paperless/export
              PAPERLESS_MEDIA_ROOT: /data/local/media
              # Configure folder importer
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              # Configure redis integration
              PAPERLESS_REDIS: redis://dragonfly.database.svc:6379/1
              # Configure user permissions
              USERMAP_GID: "1000"
              # Configure admin user
              PAPERLESS_DBHOST: pooler-rw.database.svc
              PGSSLROOTCERT: /var/run/secrets/root-ca/ca.crt
              PGSSLCERT: /var/run/secrets/postgresql/tls.crt
              PGSSLKEY: /var/run/secrets/postgresql/tls.key
              PGSSLMODE: verify-full
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://localhost:3000
              PAPERLESS_TIKA_ENDPOINT: http://localhost:9998
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              # PAPERLESS_DISABLE_REGULAR_LOGIN: 1
              # PAPERLESS_REDIRECT_LOGIN_TO_SSO: 1
            envFrom:
              - secretRef:
                  name: paperless
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
                  initialDelaySeconds: 5
            resources:
              requests:
                memory: 2Gi
              limits:
                memory: 6Gi
          gotenberg:
            env:
              DISABLE_GOOGLE_CHROME: "1"
            image:
              repository: docker.io/gotenberg/gotenberg
              tag: 8.27.0@sha256:d71ab8c13b6bd47c7bc81195082005dfb17eaa75e8b1fadd347a64ee66ed98d5
            resources:
              limits:
                memory: 142Mi
              requests:
                cpu: 10m
                memory: 142Mi
          tika:
            image:
              repository: apache/tika
              tag: 3.2.3.0@sha256:c0154cb95587cde64be74f35ada1a2bd7892219f3f0ac3c9dc6cab34046b3573

            resources:
              limits:
                memory: 251Mi
              requests:
                cpu: 10m
                memory: 251Mi
    service:
      app:
        controller: paperless
        forceRename: paperless
        ports:
          http:
            port: 8000
        primary: true

    persistence:
      data:
        type: persistentVolumeClaim
        existingClaim: paperless
        advancedMounts:
          paperless:
            app:
              - path: /data/local
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
        advancedMounts:
          paperless:
            app:
              - path: /run
                subPath: run
              - path: /var/lib/apt
                subPath: apt
      nas:
        type: nfs
        server: normandie.internal
        path: /
        globalMounts:
          - path: /data/nas

    route:
      app:
        hostnames:
          - paperless.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
