---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app anytype
spec:
  chartRef:
    kind: OCIRepository
    name: anytype
  interval: 1h
  values:
    controllers:
      anytype:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/grishy/any-sync-bundle
              tag: 1.4.1-2026-03-25
            env:
              ANY_SYNC_BUNDLE_INIT_EXTERNAL_ADDRS: "anytype.erwanleboucher.dev"
              ANY_SYNC_BUNDLE_INIT_REDIS_URI: "redis://dragonfly.database.svc.cluster.local:6379/"
              ANY_SYNC_BUNDLE_INIT_S3_BUCKET: "anytype"
              ANY_SYNC_BUNDLE_INIT_S3_ENDPOINT: "http://garage.garage-system.svc.cluster.local:3900"
              ANY_SYNC_BUNDLE_INIT_S3_FORCE_PATH_STYLE: "true"
            envFrom:
              - secretRef:
                  name: anytype-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 33010
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi

    service:
      app:
        ports:
          sync:
            port: *port
            protocol: TCP
          quic:
            port: 33020
            protocol: UDP

    route:
      app:
        hostnames:
          - anytype.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
