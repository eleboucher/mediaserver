---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: anytype
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: anytype
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: garage
      namespace: garage-system
    - name: dragonfly
      namespace: database
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/anytype/app"
  postBuild:
    substitute:
      APP: anytype
      APP_NAMESPACE: selfhosted
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
