---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      main:
        forceRename: sparkyfitness
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/codewithcj/sparkyfitness-server
              repository: ghcr.io/codewithcj/sparkyfitness-server
              tag: v0.16.5.4
            env:
              # Configure application
              SPARKY_FITNESS_DB_NAME: sparkyfitness
              SPARKY_FITNESS_DB_USER: sparkyfitness
              SPARKY_FITNESS_DB_PASSWORD: sparkyfitness
              SPARKY_FITNESS_APP_DB_USER: sparkyfitness
              SPARKY_FITNESS_APP_DB_PASSWORD: sparkyfitness
              SPARKY_FITNESS_DB_HOST: pooler-rw.database.svc
              PGSSLROOTCERT: /var/run/secrets/root-ca/ca.crt
              PGSSLCERT: /var/run/secrets/postgresql/tls.crt
              PGSSLKEY: /var/run/secrets/postgresql/tls.key
              PGSSLMODE: verify-full
              NODE_EXTRA_CA_CERTS: /var/run/secrets/root-ca/ca.crt
              SPARKY_FITNESS_FRONTEND_URL: fitness.erwanleboucher.dev
              SPARKY_FITNESS_DISABLE_SIGNUP: false
              NODE_ENV: "production"
              TZ: "Europe/Paris"
              SERVER_UPLOADS_PATH: /uploads
            envFrom:
              - secretRef:
                  name: sparkyfitness-secrets
    service:
      main:
        controller: main
        ports:
          http:
            port: 3010
    persistence:
      uploads:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/SparkyFitnessServer/uploads

      backup:
        storageClass: "longhorn"
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/SparkyFitnessServer/backup
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /app/SparkyFitnessServer/temp_uploads
            subPath: temp_uploads
