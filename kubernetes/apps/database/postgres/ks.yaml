---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-cluster
spec:
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres
      namespace: database
  interval: 1h
  dependsOn:
    - name: cloudnative-pg
      namespace: cnpg-system
    - name: plugin-barman-cloud
      namespace: cnpg-system
  path: ./kubernetes/apps/database/postgres/cluster
  prune: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: barman-ovh
        optional: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: database
  wait: false
