---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: ovh-store
spec:
  configuration:
    destinationPath: s3://homelab-postgres/
    endpointURL: ${S3_ENDPOINT}
    s3Credentials:
      accessKeyId:
        name: barman-ovh
        key: OVH_ACCESS_KEY_ID
      secretAccessKey:
        name: barman-ovh
        key: OVH_SECRET_ACCESS_KEY
    wal:
      compression: zstd
    data:
      compression: gzip
  retentionPolicy: "14d"
