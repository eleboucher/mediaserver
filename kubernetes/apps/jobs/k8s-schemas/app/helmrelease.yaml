---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-schemas
spec:
  chartRef:
    kind: OCIRepository
    name: publish-k8s-schemas
  interval: 30m
  values:
    controllers:
      k8s-schemas:
        type: cronjob
        cronjob:
          backoffLimit: 4
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          schedule: "0 */4 * * *"
          successfulJobsHistory: 1
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
        initContainers:
          generate-schemas:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2026.3.11
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          app:
            image:
              repository: docker.io/amazon/aws-cli
              tag: "2.34.32"
            env:
              AWS_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: k8s-schemas-secret
                    key: AWS_ACCESS_KEY_ID
              AWS_DEFAULT_REGION: rbx
              AWS_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: k8s-schemas-secret
                    key: AWS_SECRET_ACCESS_KEY
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                export HOME=/tmp
                aws s3 sync /data/crdSchemas/ s3://k8s-schemas \
                  --delete \
                  --acl public-read \
                  --endpoint-url https://s3.rbx.io.cloud.ovh.net
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          k8s-schemas:
            generate-schemas:
              - path: /config/.datree
                subPath: data
              - path: /tmp
                subPath: tmp
            app:
              - path: /data
                subPath: data
              - path: /tmp
                subPath: tmp
    rbac:
      roles:
        k8s-schemas:
          type: ClusterRole
          rules:
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
                - customresourcedefinitions/status
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - apiregistration.k8s.io
              resources:
                - apiservices
                - apiservices/status
              verbs:
                - get
                - list
                - watch
      bindings:
        k8s-schemas:
          type: ClusterRoleBinding
          roleRef:
            identifier: k8s-schemas
          subjects:
            - identifier: k8s-schemas
    serviceAccount:
      k8s-schemas: {}
