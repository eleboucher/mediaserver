---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-schemas
spec:
  chartRef:
    kind: OCIRepository
    name: publish-k8s-schemas
  interval: 30m
  values:
    controllers:
      extract:
        pod:
          restartPolicy: OnFailure
          securityContext:
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
        serviceAccount:
          identifier: extract
        cronjob:
          backoffLimit: 4
          concurrencyPolicy: Forbid
          failedJobsHistory: 1
          schedule: "0 */4 * * *"
          successfulJobsHistory: 1
        type: cronjob
        containers:
          app:
            image:
              repository: ghcr.io/bjw-s-labs/k8s-crd-extractor
              tag: 2025.12.22
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
      serve:
        pod:
          securityContext:
            runAsGroup: 101
            runAsNonRoot: true
            runAsUser: 101
        serviceAccount:
          identifier: serve
        replicas: 1
        type: deployment
        containers:
          app:
            image:
              repository: docker.io/nginxinc/nginx-unprivileged
              tag: alpine
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    rbac:
      roles:
        extract:
          type: ClusterRole
          rules:
            - apiGroups:
                - apiextensions.k8s.io
              resources:
                - customresourcedefinitions
                - customresourcedefinitions/status
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - apiregistration.k8s.io
              resources:
                - apiservices
                - apiservices/status
              verbs:
                - get
                - list
                - watch
      bindings:
        extract:
          type: ClusterRoleBinding
          roleRef:
            identifier: extract
          subjects:
            - identifier: extract
    route:
      app:
        parentRefs:
          - name: kgateway-internal
            namespace: network
        hostnames:
          - k8s-schemas.erwanleboucher.dev
    service:
      app:
        controller: serve
        ports:
          http:
            port: 8080
    serviceAccount:
      extract: {}
      serve: {}
    persistence:
      schemas:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          extract:
            app:
              - path: /config/.datree
                subPath: data
          serve:
            app:
              - path: /usr/share/nginx/html
                subPath: crdSchemas
      tmpfs:
        type: emptyDir
        advancedMounts:
          extract:
            app:
              - path: /tmp
                subPath: tmp
