---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: janitorr
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: janitorr
  interval: 1h
  values:
    controllers:
      janitorr:
        pod:
          securityContext:
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        type: deployment
        containers:
          app:
            image:
              repository: ghcr.io/schaka/janitorr
              tag: jvm-stable
            env:
              TZ: "Europe/Paris"
              JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75"
            envFrom:
              - secretRef:
                  name: janitorr-secret
            resources:
              requests:
                cpu: 20m
                memory: 256Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: configMap
        name: janitorr-config
        globalMounts:
          - path: /config/application.yml
            subPath: application.yml
            readOnly: true
      logs:
        type: emptyDir
        globalMounts:
          - path: /logs
