---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  chartRef:
    kind: OCIRepository
    name: jellyfin
  interval: 1h
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: jellyfin-gpu
    controllers:
      jellyfin:
        pod:
          nodeSelector:
            kubernetes.io/hostname: kharkiv
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsUser: 1000
            supplementalGroups:
              - 44 # video group
              - 992 # render group for /dev/dri
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.8
            env:
              - name: TZ
                value: "Europe/Paris"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 1
                memory: 1Gi
              limits:
                memory: 10Gi
            securityContext:
              privileged: true
    persistence:
      config:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
      metadata:
        accessMode: ReadWriteOnce
        size: 10Gi
        suffix: "metadata"
        globalMounts:
          - path: /metadata
            subPath: metadata
          - path: /config/data/introskipper
            subPath: introskipper

      data:
        type: nfs
        server: normandie.internal
        path: /
        globalMounts:
          - path: /data
      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      log:
        type: emptyDir
        globalMounts:
          - path: /config/log
      render-device:
        type: hostPath
        hostPath: /dev/dri/renderD128
        globalMounts:
          - path: /dev/dri/renderD128

    route:
      app:
        hostnames:
          - watch.erwanleboucher.dev
        parentRefs:
          - name: envoy-external
            namespace: network

    service:
      app:
        controller: jellyfin
        ports:
          http:
            port: 8096
            protocol: TCP
