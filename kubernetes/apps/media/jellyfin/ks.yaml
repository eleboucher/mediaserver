# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  components:
    - ../../../../components/gpu
    - ../../../../components/volsync
    - ../../../../components/nfs-scaler
  interval: 1h
  path: ./kubernetes/apps/media/jellyfin/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: longhorn
      namespace: longhorn-system
  postBuild:
    substitute:
      APP: jellyfin
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_SCHEDULE: "50 1-23/2 * * *"
      OIDC_DISPLAY_NAME: "Jellyfin"
      OIDC_CALLBACK: /sso/OID/redirect/kanidm
      OIDC_EXTRA_CALLBACKS: '["https://jellyfin.erwanleboucher.dev/sso/OID/r/kanidm"]'
      OIDC_ORIGIN: /sso/OID/start/kanidm
      OIDC_SHORT_USERNAME: "true"
      OIDC_GROUP: media_users
      OIDC_CUSTOM_STATE: |
        {
          "groups": {
            "media_users": {
              "members": ["users"]
            }
          }
        }
      OIDC_CLAIM_MAPS: |
        {
          "roles": {
            "joinType": "array",
            "valuesByGroup": {
              "users@idm.erwanleboucher.dev": ["user"],
              "admins@idm.erwanleboucher.dev": ["admin"]
            }
          }
        }
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
