# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app streamystats
  namespace: flux-system
spec:
  interval: 1h
  components:
    - ../../../../components/postgres/pass
    - ../../../../components/anubis
  path: ./kubernetes/apps/media/streamystats/app
  dependsOn:
    - name: cnpg-cluster
      namespace: database
    - name: envoy-gateway
      namespace: network
  prune: true
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: media
      ANUBIS_TARGET: "http://streamystats-frontend.media.svc:80"
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
