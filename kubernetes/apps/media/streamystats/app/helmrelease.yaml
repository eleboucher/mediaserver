---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: streamystats
spec:
  chartRef:
    kind: OCIRepository
    name: streamystats
  interval: 1h
  values:
    defaultPodOptions:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    controllers:
      frontend:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/fredrikburmester/streamystats-nextjs
              tag: v2.18.0
            env: &env
              NODE_ENV: production
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: streamystats-postgres
                    key: url
              SESSION_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: streamystats-secret
                    key: SESSION_SECRET
              JOB_SERVER_URL: http://streamystats-job-server
            ports:
              - containerPort: 3000
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: http
              readiness: *probes
            resources:
              requests:
                memory: 112Mi
              limits:
                memory: 1Gi
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
      job-server:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/fredrikburmester/streamystats-job-server
              tag: v2.18.0
            env:
              !!merge <<: *env
              HOST: 0.0.0.0
            ports:
              - containerPort: 3005
                name: http
            probes:
              liveness: &probesJob
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *probesJob
            resources:
              requests:
                cpu: 100m
                memory: 112Mi
              limits:
                memory: 1Gi
            securityContext: *sec
    service:
      frontend:
        controller: frontend
        ports:
          http:
            port: 80
            targetPort: 3000
      job-server:
        controller: job-server
        ports:
          http:
            port: 80
            targetPort: 3005
    route:
      main:
        parentRefs:
          - name: kgateway-external
            namespace: network
        hostnames:
          - streamystats.erwanleboucher.dev
        rules:
          - backendRefs:
              - identifier: frontend
                port: 80
