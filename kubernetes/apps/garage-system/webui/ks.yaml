---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: webui
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: webui
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
  interval: 1h
  path: "./kubernetes/apps/garage-system/webui/app"
  postBuild:
    substitute:
      APP: webui
      APP_NAMESPACE: garage-system
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: garage-system
  timeout: 5m
  wait: false
