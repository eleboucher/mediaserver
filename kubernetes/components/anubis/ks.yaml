---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${APP}-anubis-policy
spec:
  interval: 1h
  path: ./kubernetes/components/anubis/policy
  postBuild:
    substitute:
      APP: ${APP}
  prune: true
  targetNamespace: ${APP_NAMESPACE}
  retryInterval: 2m
  sourceRef:
    kind: Bucket
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
