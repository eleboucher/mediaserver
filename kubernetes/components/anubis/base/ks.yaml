---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${APP}-anubis
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: &app ${APP}
  interval: 1h
  path: ./kubernetes/components/anubis/base/anubis
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: ${APP_NAMESPACE}
      ANUBIS_TARGET: ${ANUBIS_TARGET}
      ANUBIS_DIFFICULTY: "${ANUBIS_DIFFICULTY:=\"4\"}"
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ${APP_NAMESPACE}
  timeout: 5m
  wait: false
