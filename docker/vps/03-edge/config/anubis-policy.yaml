---
bots:
  - import: (data)/meta/default-config.yaml
  - name: well-known
    path_regex: ^/\.well-known/.*$
    action: ALLOW
  - name: favicon
    path_regex: ^/favicon\.ico$
    action: ALLOW
  - name: robots-txt
    path_regex: ^/robots\.txt$
    action: ALLOW
  - name: sitemap
    path_regex: ^/sitemap\.xml$
    action: ALLOW
  - name: webmanifest
    path_regex: ^/site\.webmanifest$
    action: ALLOW
  - name: feeds
    path_regex: \.(rss|atom|xml)$
    action: ALLOW
dnsbl: false
