---
name: tunnel

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  towonel-hub:
    # renovate: datasource=docker depName=git.erwanleboucher.dev/eleboucher/towonel-node
    image: registry.erwanleboucher.dev/eleboucher/towonel-node:0.0.21
    container_name: towonel-hub
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUST_LOG: info
      TOWONEL_IDENTITY_KEY_PATH: /data/node.key
      TOWONEL_INVITE_HASH_KEY: ${TOWONEL_INVITE_HASH_KEY}
      TOWONEL_HUB_ENABLED: "true"
      TOWONEL_HUB_DB_DRIVER: sqlite
      TOWONEL_HUB_DB_DSN: /data/hub.db
      TOWONEL_HUB_LISTEN_ADDR: 0.0.0.0:8443
      TOWONEL_HUB_HEALTH_LISTEN_ADDR: 0.0.0.0:9091
      TOWONEL_HUB_PUBLIC_URL: https://towonel.erwanleboucher.dev
      TOWONEL_HUB_OPERATOR_API_KEY_PATH: /data/operator.key
      TOWONEL_EDGE_ENABLED: "true"
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TOWONEL_EDGE_PUBLIC_ADDRESSES: tunnel.erwanleboucher.dev:443
      TOWONEL_EDGE_TLS_CERT_DIR: /data/certs
      TOWONEL_EDGE_TLS_ACME_EMAIL: ${TOWONEL_ACME_EMAIL}
      TOWONEL_EDGE_TLS_HTTP_LISTEN_ADDR: 0.0.0.0:8081
    expose:
      - "4443"
      - "8081"
      - "2222"
    volumes:
      - /opt/towonel:/data
    labels:
      - prometheus.scrape=true
      - prometheus.ports=9091,9092
      - prometheus.job=towonel-node
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "-o"
        - "/dev/null"
        - "http://127.0.0.1:8443/v1/health"
      interval: 30s
      timeout: 5s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging: *default-logging
networks:
  default:
    name: edge
    external: true
