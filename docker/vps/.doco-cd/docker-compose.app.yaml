---
secrets:
  1pw_token:
    file: /opt/doco-cd/1pw_token
  api_secret:
    file: /opt/doco-cd/api_secret
  webhook_secret:
    file: /opt/doco-cd/webhook_secret
services:
  app:
    container_name: doco-cd
    environment:
      API_SECRET_FILE: /run/secrets/api_secret
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret
      DEPLOY_CONFIG_BASE_DIR: ./docker/vps/
      LOG_LEVEL: info
      POLL_CONFIG: |-
        - url: https://git.erwanleboucher.dev/eleboucher/homelab.git
          reference: main
          interval: 3600
      SECRET_PROVIDER: 1password
      SECRET_PROVIDER_ACCESS_TOKEN_FILE: /run/secrets/1pw_token
      TZ: Europe/Paris
    ports:
      - "8080:80"
      - "9120:9120"
    healthcheck:
      test:
        - CMD
        - /doco-cd
        - healthcheck
      start_period: 60s
      interval: 30s
      timeout: 5s
      retries: 3
    image: ghcr.io/kimdre/doco-cd:0.80.0@sha256:85e26d3cc4f3927bf865f3544cc30abb5f6551cdd96c8a10396eaeb0f019f4a5
    restart: unless-stopped
    secrets:
      - 1pw_token
      - api_secret
      - webhook_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
volumes:
  data: {}
networks:
  default:
    name: pangolin
    external: true
