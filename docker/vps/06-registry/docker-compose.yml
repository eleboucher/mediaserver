---
name: registry

services:
  apoci:
    # renovate: datasource=docker depName=git.erwanleboucher.dev/eleboucher/apoci
    image: git.erwanleboucher.dev/eleboucher/apoci:0.0.25
    container_name: apoci
    restart: unless-stopped
    user: "1000:1000"
    labels:
      - prometheus.scrape=true
      - prometheus.port=9090
      - prometheus.job=apoci
    depends_on:
      apoci-postgres:
        condition: service_healthy
    volumes:
      - /opt/apoci/data:/apoci/storage
    configs:
      - source: apoci_config
        target: /apoci/config/apoci.yaml
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://localhost:5000/healthz
      interval: 10s
      timeout: 5s
      retries: 3
  apoci-postgres:
    # renovate: datasource=docker depName=postgres
    image: docker.io/library/postgres:17-alpine
    container_name: apoci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      POSTGRES_DB: apoci
    volumes:
      - /opt/apoci/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U apoci
      interval: 5s
      timeout: 3s
      retries: 5

  apoci-postgres-backup:
    # renovate: datasource=docker depName=ghcr.io/itbm/postgresql-backup-s3
    image: ghcr.io/itbm/postgresql-backup-s3:1.2.3
    container_name: apoci-postgres-backup
    restart: unless-stopped
    depends_on:
      apoci-postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: apoci-postgres
      POSTGRES_DATABASE: apoci
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      S3_ENDPOINT: ${OVH_S3_ENDPOINT}
      S3_BUCKET: homelab-postgres
      S3_PREFIX: apoci
      S3_ACCESS_KEY_ID: ${OVH_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${OVH_S3_SECRET_ACCESS_KEY}
      S3_S3V4: "yes"
      SCHEDULE: "0 */6 * * *"
      DELETE_OLDER_THAN: "30 days ago"

configs:
  apoci_config:
    file: ./config/apoci.yaml

networks:
  default:
    name: edge
    external: true
