---
global:
  scrape_interval: 30s
  external_labels:
    instance: edge-vps
    location: ovh

remote_write:
  - url: http://rathole:9090/api/v1/write
    queue_config:
      max_samples_per_send: 1000
      max_shards: 5
      capacity: 2500

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - target_label: job
        replacement: node-exporter
      - target_label: instance
        replacement: edge-vps
      - target_label: nodename
        replacement: vps

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values:
              - "prometheus.scrape=true"
    relabel_configs:
      - source_labels:
          - __meta_docker_network_ip
          - __meta_docker_container_label_prometheus_port
        separator: ":"
        target_label: __address__
      - source_labels:
          - __meta_docker_container_label_prometheus_job
        target_label: job
      - target_label: instance
        replacement: edge-vps

  - job_name: towonel-hub
    static_configs:
      - targets:
          - towonel-node:9091
    relabel_configs:
      - target_label: instance
        replacement: edge-vps
