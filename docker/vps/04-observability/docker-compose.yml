---
name: observability

services:
  node-exporter:
    # renovate: datasource=docker depName=quay.io/prometheus/node-exporter
    image: quay.io/prometheus/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=:9100
    volumes:
      - /proc:/host/proc:ro,rslave
      - /sys:/host/sys:ro,rslave
      - /:/host/root:ro,rslave

  prometheus-agent:
    # renovate: datasource=docker depName=quay.io/prometheus/prometheus
    image: quay.io/prometheus/prometheus:v3.11.2
    container_name: prometheus-agent
    restart: unless-stopped
    group_add:
      - "989" # host docker group, for /var/run/docker.sock
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --agent
      - --storage.agent.path=/prometheus
    depends_on:
      - node-exporter
    configs:
      - source: prometheus_agent_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

  fluent-bit:
    # renovate: datasource=docker depName=cr.fluentbit.io/fluent/fluent-bit
    image: cr.fluentbit.io/fluent/fluent-bit:5.0
    container_name: fluent-bit
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent-bit-data:/fluent-bit/data
    configs:
      - source: fluent_bit_config
        target: /fluent-bit/etc/fluent-bit.conf
      - source: fluent_bit_enrich
        target: /fluent-bit/etc/enrich.lua
    labels:
      - prometheus.scrape=false

volumes:
  prometheus-data:
  fluent-bit-data:

configs:
  prometheus_agent_config:
    file: ./config/prometheus.yml
  fluent_bit_config:
    file: ./config/fluent-bit/fluent-bit.conf
  fluent_bit_enrich:
    file: ./config/fluent-bit/enrich.lua

networks:
  default:
    name: edge
    external: true
