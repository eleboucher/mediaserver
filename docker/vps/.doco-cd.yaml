---
working_dir: ./docker/vps
auto_discover: true
auto_discover_opts:
  depth: 1
  delete: true
force_recreate: false
external_secrets:
  OVH_APPLICATION_KEY: "op://kubernetes/ovh/OVH_APPLICATION_KEY"
  OVH_APPLICATION_SECRET: "op://kubernetes/ovh/OVH_APPLICATION_SECRET"
  OVH_CONSUMER_KEY: "op://kubernetes/ovh/OVH_CONSUMER_KEY"
  PANGOLIN_SECRET: "op://kubernetes/pangolin/server_secret"
  MAXMIND_ACCOUNT_ID: "op://kubernetes/pangolin/maxmind_account_id"
  MAXMIND_LICENSE_KEY: "op://kubernetes/pangolin/maxmind_key"
  CROWDSEC_API_KEY: "op://kubernetes/pangolin/crowdsec_api_key"
  ANUBIS_ED25519_PRIVATE_KEY_HEX: "op://kubernetes/anubis/ED25519_PRIVATE_KEY_HEX"
  OVH_S3_ENDPOINT: "op://kubernetes/ovh-cnpg-backup/S3_ENDPOINT"
  OVH_S3_ACCESS_KEY_ID: "op://kubernetes/ovh-cnpg-backup/AWS_ACCESS_KEY_ID"
  OVH_S3_SECRET_ACCESS_KEY: "op://kubernetes/ovh-cnpg-backup/AWS_SECRET_ACCESS_KEY"
  # Primary + additional OVH IPs used for per-IP port binding on the VPS
  # (Pangolin on primary, turbo-node on the additional one).
  VPS_IP: "op://kubernetes/pangolin-operator/vps_ip"
  VPS_ADD_IP: "op://kubernetes/pangolin-operator/vps_add_ip"
  # Contact email used when turbo-node registers with Let's Encrypt for
  # on-demand edge TLS termination.
  TURBO_ACME_EMAIL: "op://kubernetes/pangolin-operator/acme_email"
  FORGEJO_RUNNER_UUID: "op://kubernetes/forgejo-runner-vps/uuid"
  FORGEJO_RUNNER_TOKEN: "op://kubernetes/forgejo-runner-vps/token"
  # Shared secret between the rathole server (VPS) and the rathole client
  # (cluster) that tunnels SSH :2222 to envoy-external.
  RATHOLE_FORGEJO_SSH_TOKEN: "op://kubernetes/rathole/forgejo_ssh_token"
