---
name: pangolin
services:
  pangolin:
    image: ghcr.io/fosrl/pangolin:ee-1.17.0
    container_name: pangolin
    restart: unless-stopped
    environment:
      - SERVER_SECRET=${PANGOLIN_SECRET}
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - /opt/pangolin/config:/app/config
    configs:
      - source: pangolin_config
        target: /app/config/config.yml
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:3001/api/v1/"
      interval: "10s"
      timeout: "10s"
      retries: 15

  crowdsec:
    container_name: crowdsec
    environment:
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/linux crowdsecurity/iptables
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - cscli
        - lapi
        - status
      timeout: 5s
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.7
    labels:
      - traefik.enable=false
      - prometheus.scrape=true
      - prometheus.port=6060
      - prometheus.job=crowdsec
    ports:
      - 6060:6060
    restart: unless-stopped
    volumes:
      - /opt/crowdsec/config:/etc/crowdsec
      - /opt/crowdsec/data:/var/lib/crowdsec/data
      - /opt/pangolin/traefik-logs:/var/log/traefik
      - /var/log/journal:/var/log/host:ro
    configs:
      - source: crowdsec_acquis
        target: /etc/crowdsec/acquis.yaml
      - source: crowdsec_whitelist
        target: /etc/crowdsec/parsers/s02-enrich/my-whitelists.yaml
      - source: crowdsec_ban_gafam
        target: /etc/crowdsec/scenarios/ban-gafam.yaml
      - source: crowdsec_ban_ai_crawlers
        target: /etc/crowdsec/scenarios/ban-ai-crawlers.yaml
      - source: crowdsec_whitelist_postoverflows
        target: /etc/crowdsec/postoverflows/s01-whitelist/my-whitelists.yaml
  gerbil:
    image: ghcr.io/fosrl/gerbil:1.3.1
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - /opt/pangolin/config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - "${VPS_IP}:443:443"
      - "${VPS_IP}:80:80"
      - "${VPS_IP}:2222:2222"

  traefik:
    image: docker.io/traefik:v3.6.13
    container_name: traefik
    restart: unless-stopped
    environment:
      - OVH_ENDPOINT=ovh-eu
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
      - CROWDSEC_API_KEY=${CROWDSEC_API_KEY}
    network_mode: service:gerbil
    depends_on:
      crowdsec:
        condition: service_healthy
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - /opt/pangolin/letsencrypt:/letsencrypt
      - /opt/pangolin/traefik-logs:/var/log/traefik
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik_config.yml
      - source: traefik_dynamic_config
        target: /etc/traefik/dynamic_config.yml
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    # Shares Gerbil's network namespace so node_exporter is accessible
    # at the Gerbil WireGuard IP (100.89.128.1) on port 9100
    network_mode: service:gerbil
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=:9100
    volumes:
      - /proc:/host/proc:ro,rslave
      - /sys:/host/sys:ro,rslave
      - /:/host/root:ro,rslave
    depends_on:
      gerbil:
        condition: service_started

  prometheus-agent:
    image: quay.io/prometheus/prometheus:v3.11.2
    container_name: prometheus-agent
    restart: unless-stopped
    group_add:
      - 989
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --agent
      - --storage.agent.path=/prometheus
    depends_on:
      - node-exporter
    network_mode: service:gerbil
    configs:
      - source: prometheus_agent_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro

  anubis-website:
    image: ghcr.io/techarohq/anubis:v1.25.0
    container_name: anubis-website
    restart: unless-stopped
    network_mode: service:gerbil
    environment:
      BIND: ":8083"
      DIFFICULTY: "4"
      ED25519_PRIVATE_KEY_HEX: ${ANUBIS_ED25519_PRIVATE_KEY_HEX}
      METRICS_BIND: ":9091"
      OG_EXPIRY_TIME: "24h"
      OG_PASSTHROUGH: "true"
      POLICY_FNAME: "/etc/anubis/policy.yaml"
      SERVE_ROBOTS_TXT: "true"
      REDIRECT_DOMAINS: "erwanleboucher.dev"
      TARGET: "http://localhost:8082"
    volumes:
      - /opt/pangolin/config/anubis/policy.yaml:/etc/anubis/policy.yaml:ro
    depends_on:
      gerbil:
        condition: service_started

  apoci:
    image: git.erwanleboucher.dev/eleboucher/apoci:0.0.23
    container_name: apoci
    restart: unless-stopped
    user: "1000:1000"
    labels:
      - prometheus.scrape=true
      - prometheus.port=9090
      - prometheus.job=apoci
    depends_on:
      apoci-postgres:
        condition: service_healthy
    volumes:
      - /opt/apoci/data:/apoci/storage
    configs:
      - source: apoci_config
        target: /apoci/config/apoci.yaml
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-q"
        - "--spider"
        - "http://localhost:5000/healthz"
      interval: 10s
      timeout: 5s
      retries: 3

  apoci-postgres:
    image: postgres:17-alpine
    container_name: apoci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      POSTGRES_DB: apoci
    volumes:
      - apoci-pg-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U apoci"
      interval: 5s
      timeout: 3s
      retries: 5

  apoci-postgres-backup:
    image: ghcr.io/itbm/postgresql-backup-s3:1.2.3
    container_name: apoci-postgres-backup
    restart: unless-stopped
    depends_on:
      apoci-postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: apoci-postgres
      POSTGRES_DATABASE: apoci
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      S3_ENDPOINT: ${OVH_S3_ENDPOINT}
      S3_BUCKET: homelab-postgres
      S3_PREFIX: apoci
      S3_ACCESS_KEY_ID: ${OVH_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${OVH_S3_SECRET_ACCESS_KEY}
      S3_S3V4: "yes"
      SCHEDULE: "0 */6 * * *"
      DELETE_OLDER_THAN: "30 days ago"

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:5.0
    container_name: fluent-bit
    restart: unless-stopped
    network_mode: service:gerbil
    environment:
      - VICTORIA_LOGS_HOST=10.43.249.113
    depends_on:
      gerbil:
        condition: service_started
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /opt/pangolin/traefik-logs:/var/log/traefik:ro
      - fluent-bit-data:/fluent-bit/data
    configs:
      - source: fluent_bit_config
        target: /fluent-bit/etc/fluent-bit.conf
      - source: fluent_bit_enrich
        target: /fluent-bit/etc/enrich.lua
      - source: fluent_bit_custom_parsers
        target: /fluent-bit/etc/custom-parsers.conf

  turbo-node:
    image: git.erwanleboucher.dev/eleboucher/turbo-node:sha-8bb6ab8b62e5607daaf3551867478ec65baf2fe9
    container_name: turbo-node
    restart: unless-stopped
    environment:
      RUST_LOG: info
      TURBO_IDENTITY__KEY_PATH: /data/node.key
      TURBO_HUB__ENABLED: "true"
      TURBO_HUB__DB_PATH: /data/hub.db
      TURBO_HUB__LISTEN_ADDR: 0.0.0.0:8443
      TURBO_HUB__PUBLIC_URL: https://turbo.erwanleboucher.dev
      TURBO_HUB__OPERATOR_API_KEY_PATH: /data/operator.key
      TURBO_EDGE__ENABLED: "true"
      TURBO_EDGE__LISTEN_ADDR: 0.0.0.0:4443
      TURBO_EDGE__HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TURBO_EDGE__PUBLIC_ADDRESSES: '["tunnel.erwanleboucher.dev:443"]'
      TURBO_EDGE__TLS__CERT_DIR: /data/certs
      TURBO_EDGE__TLS__ACME_EMAIL: ${TURBO_ACME_EMAIL}
      TURBO_EDGE__TLS__HTTP_LISTEN_ADDR: 0.0.0.0:8081
    ports:
      - "${VPS_ADD_IP}:443:4443"
      - "${VPS_ADD_IP}:80:8081"
    labels:
      - prometheus.scrape=true
      - prometheus.port=9092
      - prometheus.job=turbo-node
    volumes:
      - /opt/turbo-tunnel:/data
    healthcheck:
      test:
        - CMD
        - curl
        - -sf
        - http://localhost:9092/health
      interval: 10s
      timeout: 5s
      retries: 3

  geoipupdate:
    container_name: geoipupdate
    image: ghcr.io/maxmind/geoipupdate:v7.1.1
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country GeoLite2-ASN
      - GEOIPUPDATE_FREQUENCY=72
    volumes:
      - "/opt/pangolin/config/GeoLite2:/usr/share/GeoIP"

volumes:
  apoci-pg-data:
  fluent-bit-data:
  prometheus-data:

networks:
  default:
    driver: bridge
    name: pangolin

configs:
  pangolin_config:
    file: ./config/pangolin/config.yml
  traefik_config:
    file: ./config/traefik/traefik_config.yml
  traefik_dynamic_config:
    file: ./config/traefik/dynamic_config.yml
  crowdsec_acquis:
    file: ./config/crowdsec/acquis.yaml
  crowdsec_whitelist:
    file: ./config/crowdsec/my-whitelists.yaml
  crowdsec_ban_gafam:
    file: ./config/crowdsec/ban-gafam.yaml
  crowdsec_ban_ai_crawlers:
    file: ./config/crowdsec/ban-ai-crawlers.yaml
  crowdsec_whitelist_postoverflows:
    file: ./config/crowdsec/my-whitelist-postoverflows.yaml
  apoci_config:
    file: ./config/apoci/apoci.yaml
  fluent_bit_config:
    file: ./config/fluent-bit/fluent-bit.conf
  fluent_bit_enrich:
    file: ./config/fluent-bit/enrich.lua
  fluent_bit_custom_parsers:
    file: ./config/fluent-bit/custom-parsers.conf
  prometheus_agent_config:
    file: ./config/prometheus/prometheus.yml
