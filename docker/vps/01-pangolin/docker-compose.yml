---
name: pangolin
services:
  pangolin:
    image: docker.io/fosrl/pangolin:ee-1.17.0
    container_name: pangolin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - ./config:/app/config
    configs:
      - source: pangolin_config
        target: /app/config/config.yml
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-f"
        - "http://localhost:3001/api/v1/"
      interval: "10s"
      timeout: "10s"
      retries: 15

  crowdsec:
    container_name: crowdsec
    environment:
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/linux crowdsecurity/iptables
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - cscli
        - lapi
        - status
      timeout: 5s
    image: docker.io/crowdsecurity/crowdsec:v1.7.7
    labels:
      - traefik.enable=false
    ports:
      - 6060:6060
    restart: unless-stopped
    volumes:
      - /opt/crowdsec/config:/etc/crowdsec
      - /opt/crowdsec/data:/var/lib/crowdsec/data
      - ./config/traefik/logs:/var/log/traefik
      - /var/log/journal:/var/log/host:ro
    configs:
      - source: crowdsec_acquis
        target: /etc/crowdsec/acquis.yaml
      - source: crowdsec_whitelist
        target: /etc/crowdsec/parsers/s02-enrich/my-whitelists.yaml
  gerbil:
    image: docker.io/fosrl/gerbil:1.3.1
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ./config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80
      - 2222:2222

  traefik:
    image: docker.io/traefik:v3.6.12
    container_name: traefik
    restart: unless-stopped
    environment:
      - OVH_ENDPOINT=ovh-eu
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
      - CROWDSEC_API_KEY=${CROWDSEC_API_KEY}
    network_mode: service:gerbil
    depends_on:
      crowdsec:
        condition: service_healthy
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik_config.yml
      - source: traefik_dynamic_config
        target: /etc/traefik/dynamic_config.yml
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.0
    container_name: node-exporter
    restart: unless-stopped
    # Shares Gerbil's network namespace so node_exporter is accessible
    # at the Gerbil WireGuard IP (100.89.128.1) on port 9100
    network_mode: service:gerbil
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=:9100
    volumes:
      - /proc:/host/proc:ro,rslave
      - /sys:/host/sys:ro,rslave
      - /:/host/root:ro,rslave
    depends_on:
      gerbil:
        condition: service_started

  prometheus-agent:
    image: prom/prometheus:v3.11.0
    container_name: prometheus-agent
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --agent
      - --storage.agent.path=/prometheus
    depends_on:
      - node-exporter
    network_mode: service:gerbil
    configs:
      - source: prometheus_agent_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus-data:/prometheus

  anubis-website:
    image: ghcr.io/techarohq/anubis:v1.25.0
    container_name: anubis-website
    restart: unless-stopped
    network_mode: service:gerbil
    environment:
      BIND: ":8083"
      DIFFICULTY: "4"
      ED25519_PRIVATE_KEY_HEX: ${ANUBIS_ED25519_PRIVATE_KEY_HEX}
      METRICS_BIND: ":9091"
      OG_EXPIRY_TIME: "24h"
      OG_PASSTHROUGH: "true"
      POLICY_FNAME: "/etc/anubis/policy.yaml"
      SERVE_ROBOTS_TXT: "true"
      REDIRECT_DOMAINS: "erwanleboucher.dev"
      TARGET: "http://localhost:8082"
    volumes:
      - ./config/anubis/policy.yaml:/etc/anubis/policy.yaml:ro
    depends_on:
      gerbil:
        condition: service_started

  geoipupdate:
    container_name: geoipupdate
    image: ghcr.io/maxmind/geoipupdate:v7.1.1
    restart: unless-stopped
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country GeoLite2-ASN
      - GEOIPUPDATE_FREQUENCY=72
    volumes:
      - "./config/GeoLite2:/usr/share/GeoIP"

volumes:
  prometheus-data:

networks:
  default:
    driver: bridge
    name: pangolin

configs:
  pangolin_config:
    content: |-
      # https://docs.pangolin.net/
      gerbil:
          start_port: 51820
          base_endpoint: "pangolin.erwanleboucher.dev"
      app:
          dashboard_url: "https://pangolin.erwanleboucher.dev"
          log_level: "info"
          telemetry:
              anonymous_usage: false
      domains:
          domain1:
              base_domain: "erwanleboucher.dev"
              cert_resolver: "letsencrypt"
      server:
          secret: "${PANGOLIN_SECRET}"
          cors:
              origins: ["https://pangolin.erwanleboucher.dev"]
              methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
              allowed_headers: ["X-CSRF-Token", "Content-Type"]
              credentials: false
          maxmind_db_path: "./config/GeoLite2/GeoLite2-Country.mmdb"
          maxmind_asn_path: "./config/GeoLite2/GeoLite2-ASN.mmdb"
      flags:
          require_email_verification: false
          disable_signup_without_invite: true
          disable_user_create_org: false
          allow_raw_resources: true
          enable_integration_api: true
  traefik_config:
    file: ./config/traefik/traefik_config.yml
  crowdsec_acquis:
    content: |
      source: file
      filenames:
        - /var/log/traefik/access.log
      labels:
        type: traefik
      ---
      source: journalctl
      journalctl_filter:
        - "--directory=/var/log/host/"
      labels:
        type: syslog
      ---
      source: appsec
      listen_addr: 0.0.0.0:7422
      path: /
      appsec_config: crowdsecurity/virtual-patching
      labels:
        type: appsec
  prometheus_agent_config:
    content: |-
      global:
        scrape_interval: 30s
        external_labels:
          instance: pangolin-vps
          location: ovh

      remote_write:
        - url: https://prometheus-rw.erwanleboucher.dev/api/v1/write
          tls_config:
            insecure_skip_verify: false
          queue_config:
            max_samples_per_send: 1000
            max_shards: 5
            capacity: 2500

      scrape_configs:
        - job_name: node_exporter
          static_configs:
            - targets:
                - localhost:9100
          relabel_configs:
            - target_label: job
              replacement: node-exporter
            - target_label: instance
              replacement: pangolin-vps
            - target_label: nodename
              replacement: vps
  crowdsec_whitelist:
    content: |
      name: custom/home-whitelist
      description: "Whitelist home ISP (Free SAS - AS12322)"
      whitelist:
        reason: "home ISP (Free SAS)"
        expression:
          - evt.Meta.ASNumber == "12322"
  traefik_dynamic_config:
    file: ./config/traefik/dynamic_config.yml
