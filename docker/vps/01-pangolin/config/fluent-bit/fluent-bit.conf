[SERVICE]
    flush           5
    log_level       warn
    parsers_file    /fluent-bit/etc/parsers.conf
    parsers_file    /fluent-bit/etc/custom-parsers.conf

[INPUT]
    name            tail
    path            /var/lib/docker/containers/*/*.log
    path_key        container_path
    parser          docker
    tag             docker.*
    docker_mode     on
    docker_mode_flush 5
    db              /fluent-bit/data/tail.db
    skip_empty_lines on
    refresh_interval 10

[INPUT]
    name            tail
    alias           traefik_access
    path            /var/log/traefik/access.log
    parser          json_iso8601
    tag             traefik.access
    db              /fluent-bit/data/traefik.db
    skip_empty_lines on

[INPUT]
    name            tail
    alias           traefik_app
    path            /var/log/traefik/traefik.log
    parser          json_iso8601
    tag             traefik.app
    db              /fluent-bit/data/traefik_app.db
    skip_empty_lines on

[FILTER]
    name            lua
    match           docker.*
    script          /fluent-bit/etc/enrich.lua
    call            enrich

[FILTER]
    name            grep
    match           docker.*
    exclude         container_name ^fluent-bit$

[FILTER]
    name            modify
    match           traefik.*
    add             host pangolin-vps
    add             container_name traefik

[OUTPUT]
    name            http
    match           docker.*
    host            ${VICTORIA_LOGS_HOST}
    port            9428
    uri             /insert/jsonline?_stream_fields=stream,container_name,host&_msg_field=log&_time_field=date
    format          json_lines
    json_date_format iso8601
    compress        gzip
    log_response_payload false

[OUTPUT]
    name            http
    match           traefik.*
    host            ${VICTORIA_LOGS_HOST}
    port            9428
    uri             /insert/jsonline?_stream_fields=container_name,host&_msg_field=msg&_time_field=date
    format          json_lines
    json_date_format iso8601
    compress        gzip
    log_response_payload false
