global:
  scrape_interval: 30s
  external_labels:
    instance: pangolin-vps
    location: ovh

remote_write:
  - url: https://prometheus-rw.erwanleboucher.dev/api/v1/write
    tls_config:
      insecure_skip_verify: false
    queue_config:
      max_samples_per_send: 1000
      max_shards: 5
      capacity: 2500

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets:
          - localhost:9100
    relabel_configs:
      - target_label: job
        replacement: node-exporter
      - target_label: instance
        replacement: pangolin-vps
      - target_label: nodename
        replacement: vps
  - job_name: traefik
    static_configs:
      - targets:
          - localhost:8090
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps
  - job_name: crowdsec
    static_configs:
      - targets:
          - crowdsec:6060
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps
