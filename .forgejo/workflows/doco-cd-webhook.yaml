---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Doco-CD Webhook

on:
  push:
    branches:
      - main
    paths:
      - docker/**

jobs:
  webhook:
    name: Trigger Doco-CD
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.DOCO_CD_WEBHOOK_SECRET }}
          WEBHOOK_URL: https://doco-cd.erwanleboucher.dev/v1/webhook
          REF: ${{ forgejo.ref }}
          REPO_FULL_NAME: ${{ forgejo.repository }}
          COMMIT_SHA: ${{ forgejo.sha }}
          PUSHER_NAME: ${{ forgejo.actor }}
        run: |-
          PAYLOAD=$(jq -cn \
            --arg ref "${REF}" \
            --arg before "${COMMIT_SHA}" \
            --arg after "${COMMIT_SHA}" \
            --arg clone_url "https://git.erwanleboucher.dev/eleboucher/homelab.git" \
            --arg reponame "${REPO_FULL_NAME##*/}" \
            --arg repo_fullname "${REPO_FULL_NAME}" \
            --arg pusher_name "${PUSHER_NAME}" \
            '{
              ref: $ref,
              before: $before,
              after: $after,
              repository: {
                name: $reponame,
                full_name: $repo_fullname,
                clone_url: $clone_url
              },
              pusher: {
                name: $pusher_name,
                email: "noreply@erwanleboucher.dev"
              }
            }')
          SIGNATURE="sha256=$(echo -n "${PAYLOAD}" | openssl dgst -sha256 -hmac "${WEBHOOK_SECRET}" | sed 's/^.* //')"
          curl -sf -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Gitea-Event: push" \
            -H "X-Gitea-Signature: ${SIGNATURE}" \
            -d "${PAYLOAD}"
