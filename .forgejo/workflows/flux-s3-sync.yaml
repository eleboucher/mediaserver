---
name: Sync Flux manifests to OVH S3

on:
  push:
    branches:
      - main
    paths:
      - kubernetes/**

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OVH_FLUX_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_FLUX_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: rbx
    steps:
      - name: Check out the repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Install AWS CLI
        run: |
          apt-get install -y -qq curl unzip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install

      - name: Sync kubernetes manifests to OVH S3
        run: |-
          aws s3 sync ./kubernetes/ s3://homelab-flux/kubernetes/ \
            --delete \
            --endpoint-url https://s3.rbx.io.cloud.ovh.net
