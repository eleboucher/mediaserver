---
name: Sync Flux manifests to OVH S3

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OVH_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OVH_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: rbx
    steps:
      - name: Check out the repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Install AWS CLI
        run: |
          apt-get install -y -qq curl unzip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install

      - name: Sync kubernetes manifests to OVH S3
        run: |-
          aws s3 sync ./kubernetes/ s3://homelab-flux/kubernetes/ \
            --delete \
            --endpoint-url https://s3.rbx.io.cloud.ovh.net

      - name: Trigger Flux reconciliation
        env:
          WEBHOOK_TOKEN: ${{ secrets.FLUX_WEBHOOK_TOKEN }}
          WEBHOOK_URL: ${{ secrets.FLUX_WEBHOOK_URL }}
        run: |-
          SIGNATURE=$(printf '{}' | openssl dgst -sha256 -r -hmac "${WEBHOOK_TOKEN}" | awk '{print $1}')
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${WEBHOOK_URL}" -H 'Content-Type: application/json' -H "X-Signature: sha256=${SIGNATURE}" -d '{}')
          echo "Flux webhook response: HTTP ${HTTP_STATUS}"
          test "${HTTP_STATUS}" = "200"
